<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
    <title>Animación de cámara en Three.js — GSAP Visual Codex</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-1: #0d0f10; --bg-2: #1a1d20; --bg-3: #252a30;
            --text-1: #e4e8ec; --text-2: #a1a9b3;
            --accent: #88ce02; --coral: #ff5e7a; --border-1: #2d3339;
            --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }
        body { font-family: var(--font-body); background: var(--bg-1); color: var(--text-1); }
        .page { max-width: 1000px; margin: 0 auto; padding: 2rem; }
        .back { color: var(--text-2); text-decoration: none; display: inline-block; margin-bottom: 1.5rem; padding: 0.4rem 1rem; border: 1px solid var(--border-1); border-radius: 8px; }
        .back:hover { color: var(--accent); border-color: var(--accent); }
        h1 { font-size: 2rem; color: var(--accent); margin-bottom: 0.5rem; font-family: var(--font-mono); }
        .subtitle { color: var(--text-2); margin-bottom: 2rem; }
        .stage-wrapper { background: var(--bg-2); border-radius: 12px; border: 1px solid var(--border-1); overflow: hidden; margin-bottom: 1rem; }
        #demo-stage { min-height: 300px; display: flex; align-items: center; justify-content: center; padding: 2rem; flex-wrap: wrap; gap: 1rem; position: relative; }
        .controls-bar { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }
        .btn { padding: 0.5rem 1.5rem; border-radius: 8px; border: 1px solid var(--border-1); background: var(--bg-2); color: var(--text-1); cursor: pointer; transition: all 0.2s; font-family: var(--font-body); }
        .btn:hover { border-color: var(--accent); color: var(--accent); }
        .panel { background: var(--bg-2); border-radius: 12px; border: 1px solid var(--border-1); padding: 1.5rem; margin-bottom: 2rem; }
        .panel h3 { color: var(--accent); margin-bottom: 1rem; font-size: 0.85rem; letter-spacing: 0.1em; text-transform: uppercase; }
        .control-row { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.75rem; }
        .control-row label { min-width: 130px; font-size: 0.85rem; color: var(--text-2); }
        .control-row input[type=range] { flex: 1; accent-color: var(--accent); }
        .control-row select { padding: 0.25rem 0.5rem; background: var(--bg-3); color: var(--text-1); border: 1px solid var(--border-1); border-radius: 4px; flex: 1; }
        .val { min-width: 50px; font-family: var(--font-mono); font-size: 0.85rem; color: var(--accent); }
        .code-block { background: #1e1e2e; border-radius: 12px; border: 1px solid var(--border-1); padding: 1.5rem; margin-bottom: 2rem; }
        pre { overflow-x: auto; }
        code { font-family: var(--font-mono); font-size: 0.9rem; color: #cdd6f4; white-space: pre; }
        .copy-btn { margin-bottom: 1rem; }
        .note { background: var(--bg-3); border: 1px solid var(--coral); border-radius: 8px; padding: 0.75rem 1rem; margin-bottom: 1rem; color: var(--text-2); font-size: 0.85rem; }
        .note strong { color: var(--coral); }
</style>
</head>
<body>
<div class="page">
    <a href="../../todas-las-animaciones.html" class="back">← Volver</a>
    <h1>Animación de cámara en Three.js</h1>
    <p class="subtitle">Mueve la cámara 3D con GSAP para crear efectos cinematográficos</p>
    <div class="stage-wrapper"><div id="demo-stage" style="padding:0;"><canvas id="three-canvas" style="width:100%;height:300px;display:block;"></canvas></div></div>
<div class="controls-bar"><button class="btn" onclick="restartAnim()">↻ Reiniciar</button></div>
<div class="panel"><h3>Panel de control</h3>
<div class="control-row"><label>tipo de cámara</label><select id="c-move"><option value="zoom">Zoom in/out</option><option value="orbit">Órbita</option><option value="shake">Shake</option></select></div>
<div class="control-row"><label>duration</label><input type="range" id="c-dur" min="0.5" max="4" step="0.1" value="2"><span class="val" id="v-dur">2</span></div>
</div>
<div class="code-block"><button class="btn copy-btn" onclick="copyCode()">📋 Copiar</button><pre><code id="code-display"></code></pre></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
let currentTween = null;
const stage = document.getElementById('demo-stage');
function copyCode() { navigator.clipboard.writeText(document.getElementById('code-display').textContent); }

let renderer, scene, camera, animId;
function restartAnim() {
    if (animId) cancelAnimationFrame(animId);
    if (renderer) renderer.dispose();
    gsap.killTweensOf('*');
    const canvas = document.getElementById('three-canvas');
    const move = document.getElementById('c-move').value;
    const dur = parseFloat(document.getElementById('c-dur').value);
    renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setSize(canvas.clientWidth, 300);
    renderer.setClearColor(0x0d0f10);
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(75, canvas.clientWidth / 300, 0.1, 100);
    camera.position.set(0, 0, 5);
    // Crear varios objetos
    const colors = [0x88ce02, 0xff5e7a, 0x4fc3f7, 0xffb74d];
    colors.forEach((c, i) => {
        const mesh = new THREE.Mesh(
            new THREE.IcosahedronGeometry(0.5, 0),
            new THREE.MeshStandardMaterial({ color: c, wireframe: i % 2 === 0 })
        );
        mesh.position.set((i - 1.5) * 1.5, Math.sin(i) * 0.5, 0);
        scene.add(mesh);
        gsap.to(mesh.rotation, { y: Math.PI * 2, duration: 2 + i * 0.3, ease: 'none', repeat: -1 });
    });
    scene.add(new THREE.DirectionalLight(0xffffff, 2));
    scene.add(new THREE.AmbientLight(0x404040, 3));
    if (move === 'zoom') {
        gsap.to(camera.position, { z: 2, duration: dur, ease: 'power2.inOut', yoyo: true, repeat: -1 });
    } else if (move === 'orbit') {
        const obj = { angle: 0 };
        gsap.to(obj, { angle: Math.PI * 2, duration: dur * 2, ease: 'none', repeat: -1, onUpdate: () => {
            camera.position.x = Math.sin(obj.angle) * 5;
            camera.position.z = Math.cos(obj.angle) * 5;
            camera.lookAt(0, 0, 0);
        }});
    } else {
        gsap.to(camera.position, { x: '+=0.1', y: '+=0.05', duration: 0.1, ease: 'none', repeat: -1, yoyo: true });
    }
    const animate = () => { animId = requestAnimationFrame(animate); renderer.render(scene, camera); };
    animate();
    document.getElementById('code-display').textContent = `// Animación de cámara con GSAP
// Zoom
gsap.to(camera.position, { z: 2, duration: ${dur}, ease: "power2.inOut", yoyo: true, repeat: -1 });

// Órbita
const obj = { angle: 0 };
gsap.to(obj, { angle: Math.PI * 2, duration: ${dur * 2}, ease: "none", repeat: -1,
  onUpdate: () => {
    camera.position.x = Math.sin(obj.angle) * 5;
    camera.position.z = Math.cos(obj.angle) * 5;
    camera.lookAt(0, 0, 0);
  }
});`;
}
document.getElementById('c-move').addEventListener('change', restartAnim);
document.getElementById('c-dur').addEventListener('input', function() { document.getElementById('v-dur').textContent = this.value; restartAnim(); });

if (typeof restartAnim === 'function') restartAnim();
</script>
</body>
</html>
