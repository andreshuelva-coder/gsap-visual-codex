<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
    <title>Three.js + ScrollTrigger — GSAP Visual Codex</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-1: #0d0f10; --bg-2: #1a1d20; --bg-3: #252a30;
            --text-1: #e4e8ec; --text-2: #a1a9b3;
            --accent: #88ce02; --coral: #ff5e7a; --border-1: #2d3339;
            --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }
        body { font-family: var(--font-body); background: var(--bg-1); color: var(--text-1); }
        .page { max-width: 1000px; margin: 0 auto; padding: 2rem; }
        .back { color: var(--text-2); text-decoration: none; display: inline-block; margin-bottom: 1.5rem; padding: 0.4rem 1rem; border: 1px solid var(--border-1); border-radius: 8px; }
        .back:hover { color: var(--accent); border-color: var(--accent); }
        h1 { font-size: 2rem; color: var(--accent); margin-bottom: 0.5rem; font-family: var(--font-mono); }
        .subtitle { color: var(--text-2); margin-bottom: 2rem; }
        .stage-wrapper { background: var(--bg-2); border-radius: 12px; border: 1px solid var(--border-1); overflow: hidden; margin-bottom: 1rem; }
        #demo-stage { min-height: 300px; display: flex; align-items: center; justify-content: center; padding: 2rem; flex-wrap: wrap; gap: 1rem; position: relative; }
        .controls-bar { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }
        .btn { padding: 0.5rem 1.5rem; border-radius: 8px; border: 1px solid var(--border-1); background: var(--bg-2); color: var(--text-1); cursor: pointer; transition: all 0.2s; font-family: var(--font-body); }
        .btn:hover { border-color: var(--accent); color: var(--accent); }
        .panel { background: var(--bg-2); border-radius: 12px; border: 1px solid var(--border-1); padding: 1.5rem; margin-bottom: 2rem; }
        .panel h3 { color: var(--accent); margin-bottom: 1rem; font-size: 0.85rem; letter-spacing: 0.1em; text-transform: uppercase; }
        .control-row { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.75rem; }
        .control-row label { min-width: 130px; font-size: 0.85rem; color: var(--text-2); }
        .control-row input[type=range] { flex: 1; accent-color: var(--accent); }
        .control-row select { padding: 0.25rem 0.5rem; background: var(--bg-3); color: var(--text-1); border: 1px solid var(--border-1); border-radius: 4px; flex: 1; }
        .val { min-width: 50px; font-family: var(--font-mono); font-size: 0.85rem; color: var(--accent); }
        .code-block { background: #1e1e2e; border-radius: 12px; border: 1px solid var(--border-1); padding: 1.5rem; margin-bottom: 2rem; }
        pre { overflow-x: auto; }
        code { font-family: var(--font-mono); font-size: 0.9rem; color: #cdd6f4; white-space: pre; }
        .copy-btn { margin-bottom: 1rem; }
        .note { background: var(--bg-3); border: 1px solid var(--coral); border-radius: 8px; padding: 0.75rem 1rem; margin-bottom: 1rem; color: var(--text-2); font-size: 0.85rem; }
        .note strong { color: var(--coral); }
</style>
</head>
<body>
<div class="page">
    <a href="../../todas-las-animaciones.html" class="back">← Volver</a>
    <h1>Three.js + ScrollTrigger</h1>
    <p class="subtitle">Controla una escena 3D con scroll</p>
    <div class="note"><strong>Haz scroll</strong> dentro del área para controlar la escena 3D</div>
<div class="stage-wrapper" id="scroll-container" style="max-height:400px;overflow-y:scroll;">
  <div style="height:150px;display:flex;align-items:center;justify-content:center;color:var(--text-2);">↓ Scroll para animar la escena 3D ↓</div>
  <div style="height:200px;"><canvas id="three-canvas" style="width:100%;height:200px;display:block;"></canvas></div>
  <div style="height:500px;display:flex;align-items:center;justify-content:center;color:var(--text-2);">Sigue haciendo scroll...</div>
</div>
<div class="code-block"><button class="btn copy-btn" onclick="copyCode()">📋 Copiar</button><pre><code id="code-display"></code></pre></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
let currentTween = null;
const stage = document.getElementById('demo-stage');
function copyCode() { navigator.clipboard.writeText(document.getElementById('code-display').textContent); }

function restartAnim() {
    if (window.ScrollTrigger) ScrollTrigger.getAll().forEach(t => t.kill());
    gsap.killTweensOf('*');
    const canvas = document.getElementById('three-canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setSize(canvas.clientWidth, 200);
    renderer.setClearColor(0x1a1d20);
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, canvas.clientWidth / 200, 0.1, 100);
    camera.position.z = 4;
    const geo = new THREE.TorusKnotGeometry(1, 0.3, 100, 16);
    const mat = new THREE.MeshStandardMaterial({ color: 0x88ce02, wireframe: false, metalness: 0.5 });
    const mesh = new THREE.Mesh(geo, mat);
    scene.add(mesh);
    scene.add(new THREE.DirectionalLight(0xffffff, 2));
    scene.add(new THREE.AmbientLight(0x404040, 3));
    const container = document.getElementById('scroll-container');
    const progress = { val: 0 };
    container.addEventListener('scroll', () => {
        const p = container.scrollTop / (container.scrollHeight - container.clientHeight);
        gsap.to(mesh.rotation, { y: p * Math.PI * 4, x: p * Math.PI * 2, duration: 0.5, ease: 'power2.out' });
        gsap.to(camera.position, { z: 4 - p * 2, duration: 0.5 });
    });
    const animate = () => { requestAnimationFrame(animate); renderer.render(scene, camera); };
    animate();
    document.getElementById('code-display').textContent = `// Three.js + Scroll
const mesh = new THREE.Mesh(geo, mat);

// Actualizar en cada evento scroll
container.addEventListener("scroll", () => {
  const progress = scrollTop / maxScroll;
  gsap.to(mesh.rotation, {
    y: progress * Math.PI * 4,
    duration: 0.5,
    ease: "power2.out"
  });
  gsap.to(camera.position, { z: 4 - progress * 2, duration: 0.5 });
});`;
}

if (typeof restartAnim === 'function') restartAnim();
</script>
</body>
</html>
