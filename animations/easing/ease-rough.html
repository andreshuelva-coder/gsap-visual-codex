<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
    <title>RoughEase — GSAP Visual Codex</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-1: #0d0f10; --bg-2: #1a1d20; --bg-3: #252a30;
            --text-1: #e4e8ec; --text-2: #a1a9b3;
            --accent: #88ce02; --border-1: #2d3339;
            --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }
        body { font-family: var(--font-body); background: var(--bg-1); color: var(--text-1); }
        .page { max-width: 1000px; margin: 0 auto; padding: 2rem; }
        .back { color: var(--text-2); text-decoration: none; display: inline-block; margin-bottom: 1.5rem; }
        .back:hover { color: var(--accent); }
        h1 { font-size: 2rem; color: var(--accent); margin-bottom: 0.5rem; }
        .subtitle { color: var(--text-2); margin-bottom: 2rem; }
        .stage-wrapper { background: var(--bg-2); border-radius: 12px; border: 1px solid var(--border-1); overflow: hidden; margin-bottom: 1rem; }
        #demo-stage { min-height: 200px; display: flex; align-items: center; justify-content: flex-start; padding: 2rem; position: relative; }
        .controls-bar { display: flex; gap: 1rem; margin-bottom: 2rem; }
        .btn { padding: 0.5rem 1.5rem; border-radius: 8px; border: 1px solid var(--border-1); background: var(--bg-2); color: var(--text-1); cursor: pointer; transition: all 0.2s; }
        .btn:hover { border-color: var(--accent); color: var(--accent); }
        .panel { background: var(--bg-2); border-radius: 12px; border: 1px solid var(--border-1); padding: 1.5rem; margin-bottom: 2rem; }
        .panel h3 { color: var(--accent); margin-bottom: 1rem; font-size: 0.85rem; letter-spacing: 0.1em; text-transform: uppercase; }
        .control-row { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.75rem; }
        .control-row label { min-width: 120px; font-size: 0.85rem; color: var(--text-2); }
        .control-row input[type=range] { flex: 1; accent-color: var(--accent); }
        .control-row select { padding: 0.25rem 0.5rem; background: var(--bg-3); color: var(--text-1); border: 1px solid var(--border-1); border-radius: 4px; flex: 1; }
        .val { min-width: 50px; font-family: var(--font-mono); font-size: 0.85rem; color: var(--accent); }
        .code-block { background: #1e1e2e; border-radius: 12px; border: 1px solid var(--border-1); padding: 1.5rem; margin-bottom: 2rem; }
        .code-block pre { overflow-x: auto; }
        .code-block code { font-family: var(--font-mono); font-size: 0.9rem; color: #cdd6f4; white-space: pre; }
        .copy-btn { margin-bottom: 1rem; }
        .demo-box { width: 70px; height: 70px; border-radius: 12px; background: linear-gradient(135deg, #88ce02, #6ba301); box-shadow: 0 8px 24px rgba(136,206,2,0.4); display: grid; place-items: center; font-family: var(--font-mono); color: #0a1400; font-weight: 700; font-size: 0.75rem; flex-shrink: 0; }
        .track { flex: 1; height: 4px; background: var(--border-1); border-radius: 2px; margin-left: 1rem; position: relative; }
        .desc { background: var(--bg-2); border-radius: 12px; border: 1px solid var(--border-1); padding: 1.5rem; margin-bottom: 2rem; color: var(--text-2); line-height: 1.6; }
        .desc strong { color: var(--accent); }
    </style>
</head>
<body>
<div class="page">
    <a href="../../todas-las-animaciones.html" class="back">← Volver</a>
    <h1>RoughEase</h1>
    <p class="subtitle">Movimiento irregular y orgánico</p>

    <div class="desc">Añade <strong>irregularidad aleatoria</strong> al movimiento. Perfecto para efectos de temblor, dibujo a mano o movimiento orgánico.</div>

    <div class="stage-wrapper">
        <div id="demo-stage"></div>
    </div>
    <div class="controls-bar">
        <button class="btn" onclick="restartAnim()">↻ Reiniciar</button>
        <button class="btn" onclick="pauseAnim()">⏸ Pausa</button>
        <button class="btn" onclick="runAnim()">▶ Reproducir</button>
    </div>

    <div class="panel">
        <h3>Panel de control</h3>
        <div class="control-row">
            <label>duration</label>
            <input type="range" id="c-duration" min="0.3" max="3" step="0.1" value="1.5">
            <span class="val" id="v-duration">1.5</span>
        </div>
        <div class="control-row">
            <label>distancia (px)</label>
            <input type="range" id="c-dist" min="100" max="600" step="10" value="400">
            <span class="val" id="v-dist">400</span>
        </div>
        
    </div>

    <div class="code-block">
        <button class="btn copy-btn" onclick="copyCode()">📋 Copiar código</button>
        <pre><code id="code-display"></code></pre>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
let currentTween = null;
const stage = document.getElementById('demo-stage');

function getParams() {
    return {
        duration: parseFloat(document.getElementById('c-duration').value),
        dist: parseFloat(document.getElementById('c-dist').value),
        
    };
}

function updateCode() {
    const p = getParams();
    document.getElementById('code-display').textContent = `gsap.to(".caja", {
  x: ${p.dist},
  duration: ${p.duration},
  ease: "rough({strength:1,points:20,taper:'none'})"
});`;
}

function restartAnim() {
    stage.innerHTML = '';
    if (currentTween?.kill) currentTween.kill();
    gsap.killTweensOf('*');

    const box = document.createElement('div');
    box.className = 'demo-box';
    box.textContent = 'ease';
    stage.appendChild(box);

    const p = getParams();
    currentTween = gsap.fromTo(box,
        { x: 0 },
        { x: p.dist, duration: p.duration, ease: "rough({strength:1,points:20,taper:'none'})", repeat: -1, yoyo: true, repeatDelay: 0.5 }
    );
    updateCode();
}

function runAnim() { currentTween?.play?.(); }
function pauseAnim() { currentTween?.pause?.(); }
function copyCode() {
    navigator.clipboard.writeText(document.getElementById('code-display').textContent);
}

document.getElementById('c-duration').addEventListener('input', function() {
    document.getElementById('v-duration').textContent = this.value;
    restartAnim();
});
document.getElementById('c-dist').addEventListener('input', function() {
    document.getElementById('v-dist').textContent = this.value;
    restartAnim();
});

restartAnim();
</script>
</body>
</html>
