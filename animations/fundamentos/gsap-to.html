<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
    <title>gsap.to() — GSAP Visual Codex</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-1: #0d0f10; --bg-2: #1a1d20; --bg-3: #252a30;
            --text-1: #e4e8ec; --text-2: #a1a9b3;
            --accent: #88ce02; --border-1: #2d3339;
            --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }
        body { font-family: var(--font-body); background: var(--bg-1); color: var(--text-1); }
        .page { max-width: 1000px; margin: 0 auto; padding: 2rem; }
        .back { color: var(--text-2); text-decoration: none; display: inline-block; margin-bottom: 1.5rem; }
        .back:hover { color: var(--accent); }
        h1 { font-size: 2rem; color: var(--accent); margin-bottom: 0.5rem; }
        .subtitle { color: var(--text-2); margin-bottom: 2rem; }
        
        .stage-wrapper { background: var(--bg-2); border-radius: 12px; border: 1px solid var(--border-1); overflow: hidden; margin-bottom: 1rem; }
        #demo-stage { min-height: 300px; display: flex; align-items: center; justify-content: flex-start; padding: 2rem; }
        
        .controls-bar { display: flex; gap: 1rem; margin-bottom: 2rem; }
        .btn { padding: 0.5rem 1.5rem; border-radius: 8px; border: 1px solid var(--border-1); background: var(--bg-2); color: var(--text-1); cursor: pointer; transition: all 0.2s; }
        .btn:hover { border-color: var(--accent); color: var(--accent); }

        .panel { background: var(--bg-2); border-radius: 12px; border: 1px solid var(--border-1); padding: 1.5rem; margin-bottom: 2rem; }
        .panel h3 { color: var(--accent); margin-bottom: 1rem; font-size: 0.85rem; letter-spacing: 0.1em; text-transform: uppercase; }
        .control-row { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.75rem; }
        .control-row label { min-width: 120px; font-size: 0.85rem; color: var(--text-2); }
        .control-row input[type=range] { flex: 1; accent-color: var(--accent); }
        .control-row select { padding: 0.25rem 0.5rem; background: var(--bg-3); color: var(--text-1); border: 1px solid var(--border-1); border-radius: 4px; }
        .val { min-width: 50px; font-family: var(--font-mono); font-size: 0.85rem; color: var(--accent); }
        
        .code-block { background: #1e1e2e; border-radius: 12px; border: 1px solid var(--border-1); padding: 1.5rem; }
        .code-block pre { overflow-x: auto; }
        .code-block code { font-family: var(--font-mono); font-size: 0.9rem; color: #cdd6f4; white-space: pre; }
        .copy-btn { margin-bottom: 1rem; }

        .demo-box {
            width: 90px; height: 90px; border-radius: 16px;
            background: linear-gradient(135deg, #88ce02, #6ba301);
            box-shadow: 0 8px 24px rgba(136,206,2,0.4);
            display: grid; place-items: center;
            font-family: var(--font-mono); color: #0a1400;
            font-weight: 700; font-size: 0.85rem;
        }
    </style>
</head>
<body>
<div class="page">
    <a href="../../todas-las-animaciones.html" class="back">← Volver</a>
    <h1>gsap.to()</h1>
    <p class="subtitle">Anima un elemento desde su estado actual hacia un nuevo estado</p>

    <div class="stage-wrapper">
        <div id="demo-stage"></div>
    </div>
    
    <div class="controls-bar">
        <button class="btn" onclick="runAnim()">▶ Reproducir</button>
        <button class="btn" onclick="restartAnim()">↻ Reiniciar</button>
        <button class="btn" onclick="pauseAnim()">⏸ Pausa</button>
    </div>

    <div class="panel">
        <h3>Panel de control</h3>
        <div class="control-row">
            <label>duration</label>
            <input type="range" id="c-duration" min="0.1" max="3" step="0.1" value="1">
            <span class="val" id="v-duration">1</span>
        </div>
        <div class="control-row">
            <label>x (px)</label>
            <input type="range" id="c-x" min="-300" max="300" step="5" value="200">
            <span class="val" id="v-x">200</span>
        </div>
        <div class="control-row">
            <label>y (px)</label>
            <input type="range" id="c-y" min="-200" max="200" step="5" value="0">
            <span class="val" id="v-y">0</span>
        </div>
        <div class="control-row">
            <label>rotation</label>
            <input type="range" id="c-rotation" min="-360" max="360" step="5" value="0">
            <span class="val" id="v-rotation">0</span>
        </div>
        <div class="control-row">
            <label>scale</label>
            <input type="range" id="c-scale" min="0.2" max="3" step="0.05" value="1">
            <span class="val" id="v-scale">1</span>
        </div>
        <div class="control-row">
            <label>ease</label>
            <select id="c-ease">
                <option>power2.out</option>
                <option>power1.out</option>
                <option>power3.out</option>
                <option>power4.out</option>
                <option>elastic.out(1,0.3)</option>
                <option>back.out(1.7)</option>
                <option>bounce.out</option>
                <option>sine.inOut</option>
                <option>expo.out</option>
                <option>none</option>
            </select>
        </div>
        <div class="control-row">
            <label>repeat</label>
            <input type="range" id="c-repeat" min="0" max="5" step="1" value="0">
            <span class="val" id="v-repeat">0</span>
        </div>
    </div>

    <div class="code-block">
        <button class="btn copy-btn" onclick="copyCode()">📋 Copiar código</button>
        <pre><code id="code-display"></code></pre>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
let currentTween = null;
let box = null;

function getParams() {
    return {
        duration: parseFloat(document.getElementById('c-duration').value),
        x: parseFloat(document.getElementById('c-x').value),
        y: parseFloat(document.getElementById('c-y').value),
        rotation: parseFloat(document.getElementById('c-rotation').value),
        scale: parseFloat(document.getElementById('c-scale').value),
        ease: document.getElementById('c-ease').value,
        repeat: parseInt(document.getElementById('c-repeat').value),
    };
}

function updateCode() {
    const p = getParams();
    const lines = [
        `  x: ${p.x},`,
        p.y !== 0 ? `  y: ${p.y},` : null,
        p.rotation !== 0 ? `  rotation: ${p.rotation},` : null,
        p.scale !== 1 ? `  scale: ${p.scale},` : null,
        `  duration: ${p.duration},`,
        `  ease: "${p.ease}",`,
        p.repeat > 0 ? `  repeat: ${p.repeat},` : null,
    ].filter(Boolean).join('\n');
    document.getElementById('code-display').textContent = `gsap.to(".caja", {\n${lines}\n});`;
}

function restartAnim() {
    const stage = document.getElementById('demo-stage');
    stage.innerHTML = '';
    if (currentTween) { currentTween.kill(); currentTween = null; }
    
    box = document.createElement('div');
    box.className = 'demo-box';
    box.textContent = 'BOX';
    
    const wrapper = document.createElement('div');
    wrapper.style.cssText = 'width:100%;display:flex;justify-content:flex-start;';
    wrapper.appendChild(box);
    stage.appendChild(wrapper);
    
    const p = getParams();
    currentTween = gsap.to(box, {
        x: p.x, y: p.y, rotation: p.rotation, scale: p.scale,
        duration: p.duration, ease: p.ease, repeat: p.repeat
    });
    updateCode();
}

function runAnim() { currentTween?.play(); }
function pauseAnim() { currentTween?.pause(); }
function copyCode() {
    navigator.clipboard.writeText(document.getElementById('code-display').textContent);
    alert('¡Código copiado!');
}

// Conectar sliders
['duration','x','y','rotation','scale','repeat'].forEach(id => {
    const input = document.getElementById('c-' + id);
    const val = document.getElementById('v-' + id);
    input.addEventListener('input', () => {
        val.textContent = input.value;
        restartAnim();
    });
});
document.getElementById('c-ease').addEventListener('change', restartAnim);

// Iniciar
restartAnim();
</script>
</body>
</html>
