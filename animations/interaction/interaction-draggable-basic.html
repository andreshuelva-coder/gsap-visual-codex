<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
    <title>Draggable básico — GSAP Visual Codex</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-1: #0d0f10; --bg-2: #1a1d20; --bg-3: #252a30;
            --text-1: #e4e8ec; --text-2: #a1a9b3;
            --accent: #88ce02; --coral: #ff5e7a; --border-1: #2d3339;
            --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }
        body { font-family: var(--font-body); background: var(--bg-1); color: var(--text-1); }
        .page { max-width: 1000px; margin: 0 auto; padding: 2rem; }
        .back { color: var(--text-2); text-decoration: none; display: inline-block; margin-bottom: 1.5rem; padding: 0.4rem 1rem; border: 1px solid var(--border-1); border-radius: 8px; transition: all 0.2s; }
        .back:hover { color: var(--accent); border-color: var(--accent); }
        h1 { font-size: 2rem; color: var(--accent); margin-bottom: 0.5rem; font-family: var(--font-mono); }
        .subtitle { color: var(--text-2); margin-bottom: 2rem; }
        .stage-wrapper { background: var(--bg-2); border-radius: 12px; border: 1px solid var(--border-1); overflow: hidden; margin-bottom: 1rem; }
        #demo-stage { min-height: 300px; display: flex; align-items: center; justify-content: center; padding: 2rem; flex-wrap: wrap; gap: 1rem; position: relative; }
        .controls-bar { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }
        .btn { padding: 0.5rem 1.5rem; border-radius: 8px; border: 1px solid var(--border-1); background: var(--bg-2); color: var(--text-1); cursor: pointer; transition: all 0.2s; font-family: var(--font-body); }
        .btn:hover { border-color: var(--accent); color: var(--accent); }
        .panel { background: var(--bg-2); border-radius: 12px; border: 1px solid var(--border-1); padding: 1.5rem; margin-bottom: 2rem; }
        .panel h3 { color: var(--accent); margin-bottom: 1rem; font-size: 0.85rem; letter-spacing: 0.1em; text-transform: uppercase; }
        .control-row { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.75rem; }
        .control-row label { min-width: 130px; font-size: 0.85rem; color: var(--text-2); }
        .control-row input[type=range] { flex: 1; accent-color: var(--accent); }
        .control-row select { padding: 0.25rem 0.5rem; background: var(--bg-3); color: var(--text-1); border: 1px solid var(--border-1); border-radius: 4px; flex: 1; }
        .val { min-width: 50px; font-family: var(--font-mono); font-size: 0.85rem; color: var(--accent); }
        .code-block { background: #1e1e2e; border-radius: 12px; border: 1px solid var(--border-1); padding: 1.5rem; margin-bottom: 2rem; }
        pre { overflow-x: auto; }
        code { font-family: var(--font-mono); font-size: 0.9rem; color: #cdd6f4; white-space: pre; }
        .copy-btn { margin-bottom: 1rem; }
    </style>
</head>
<body>
<div class="page">
    <a href="../../todas-las-animaciones.html" class="back">← Volver</a>
    <h1>Draggable básico</h1>
    <p class="subtitle">Elemento arrastrable con GSAP Draggable</p>
    
<div class="stage-wrapper"><div id="demo-stage"><div id="drag-box" style="width:100px;height:100px;border-radius:16px;background:linear-gradient(135deg,#88ce02,#5a8a01);color:#0a1400;display:grid;place-items:center;font-family:monospace;font-weight:700;cursor:grab;user-select:none;box-shadow:0 8px 24px rgba(136,206,2,0.4);">↕↔<br>DRAG</div></div></div>
<div class="controls-bar"><button class="btn" onclick="restartAnim()">↻ Reiniciar</button></div>
<div class="panel"><h3>Panel de control</h3>
<div class="control-row"><label>tipo</label><select id="c-type"><option value="x,y">x,y (libre)</option><option value="x">x (horizontal)</option><option value="y">y (vertical)</option></select></div>
<div class="control-row"><label>bounds</label><select id="c-bounds"><option value="true">contenedor</option><option value="false">libre</option></select></div>
</div>
<div class="code-block"><button class="btn copy-btn" onclick="copyCode()">📋 Copiar</button><pre><code id="code-display"></code></pre></div>

</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

<script>
let currentTween = null;
const stage = document.getElementById('demo-stage');


let draggableInstance = null;
function restartAnim() {
    if (draggableInstance) { draggableInstance.kill(); draggableInstance = null; }
    gsap.set('#drag-box', { x: 0, y: 0 });
    const type = document.getElementById('c-type').value;
    const bounded = document.getElementById('c-bounds').value === 'true';
    const box = document.getElementById('drag-box');
    box.style.cursor = 'grab';
    // Draggable manual sin plugin
    let isDragging = false, startX = 0, startY = 0, elX = 0, elY = 0;
    let curX = 0, curY = 0;
    const stageRect = stage.getBoundingClientRect();
    box.addEventListener('mousedown', e => {
        isDragging = true;
        startX = e.clientX - curX;
        startY = e.clientY - curY;
        box.style.cursor = 'grabbing';
        e.preventDefault();
    });
    document.addEventListener('mousemove', e => {
        if (!isDragging) return;
        if (type.includes('x')) curX = e.clientX - startX;
        if (type.includes('y')) curY = e.clientY - startY;
        if (bounded) {
            const r = stage.getBoundingClientRect();
            const b = box.getBoundingClientRect();
            curX = Math.max(-r.width/2+b.width/2, Math.min(r.width/2-b.width/2, curX));
            curY = Math.max(-r.height/2+b.height/2, Math.min(r.height/2-b.height/2, curY));
        }
        gsap.set(box, { x: curX, y: curY });
    });
    document.addEventListener('mouseup', () => { isDragging = false; box.style.cursor = 'grab'; });
    draggableInstance = { kill: () => {} };
    document.getElementById('code-display').textContent = `// Con Draggable plugin:
gsap.registerPlugin(Draggable);

Draggable.create("#mi-elemento", {
  type: "${type}",
  bounds: ${bounded ? '"#contenedor"' : 'false'},
  onDrag: function() {
    console.log("x:", this.x, "y:", this.y);
  }
});`;
}
document.getElementById('c-type').addEventListener('change', restartAnim);
document.getElementById('c-bounds').addEventListener('change', restartAnim);


function copyCode() {
    navigator.clipboard.writeText(document.getElementById('code-display').textContent);
}

if (typeof restartAnim === 'function') restartAnim();
</script>
</body>
</html>
