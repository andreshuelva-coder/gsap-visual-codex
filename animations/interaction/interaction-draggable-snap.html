<title>Draggable con snap — GSAP Visual Codex</title><style>* { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --bg-1: #0d0f10; --bg-2: #1a1d20; --bg-3: #252a30; --text-1: #e4e8ec; --text-2: #a1a9b3; --accent: #88ce02; --coral: #ff5e7a; --border-1: #2d3339; --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; --font-mono: 'JetBrains Mono', monospace; }
        body { font-family: var(--font-body); background: var(--bg-1); color: var(--text-1); }

        .btn { padding: 0.5rem 1.5rem; border-radius: 8px; border: 1px solid var(--border-1); background: var(--bg-2); color: var(--text-1); cursor: pointer; transition: all 0.2s; font-family: var(--font-body); }
        .btn:hover { border-color: var(--accent); color: var(--accent); }
        .panel { background: var(--bg-2); border-radius: 12px; border: 1px solid var(--border-1); padding: 1.5rem; margin-bottom: 2rem; }
        .panel h3 { color: var(--accent); margin-bottom: 1rem; font-size: 0.85rem; letter-spacing: 0.1em; text-transform: uppercase; }

        .control-row label { min-width: 130px; font-size: 0.85rem; color: var(--text-2); }
        .control-row input[type=range] { flex: 1; accent-color: var(--accent); }
        .control-row select { padding: 0.25rem 0.5rem; background: var(--bg-3); color: var(--text-1); border: 1px solid var(--border-1); border-radius: 4px; flex: 1; }

<body><div class="page">
<a href="../../todas-las-animaciones.html" class="back">← Volver</a>
<h1>Draggable con snap</h1><p class="subtitle">Arrastra y el elemento encaja en posiciones específicas</p>

<div class="stage-wrapper"><div id="demo-stage" style="position:relative;flex-direction:column;gap:1rem;">
  <p style="color:var(--text-2);font-size:0.85rem;">Arrastra la caja — encajará en las posiciones marcadas</p>
  <div style="position:relative;width:100%;height:80px;background:var(--bg-3);border-radius:8px;display:flex;align-items:center;justify-content:space-around;">
    <div class="snap-point" style="width:60px;height:60px;border:2px dashed var(--border-1);border-radius:8px;display:grid;place-items:center;color:var(--text-2);font-size:0.75rem;">A</div>
    <div class="snap-point" style="width:60px;height:60px;border:2px dashed var(--border-1);border-radius:8px;display:grid;place-items:center;color:var(--text-2);font-size:0.75rem;">B</div>
    <div class="snap-point" style="width:60px;height:60px;border:2px dashed var(--border-1);border-radius:8px;display:grid;place-items:center;color:var(--text-2);font-size:0.75rem;">C</div>
    <div class="snap-point" style="width:60px;height:60px;border:2px dashed var(--border-1);border-radius:8px;display:grid;place-items:center;color:var(--text-2);font-size:0.75rem;">D</div>
  </div>
  <div id="snap-box" style="width:60px;height:60px;background:linear-gradient(135deg,#88ce02,#5a8a01);border-radius:8px;display:grid;place-items:center;font-family:monospace;font-weight:700;color:#000;cursor:grab;position:absolute;bottom:2rem;">↔</div>
</div></div>
<div class="controls-bar"><button class="btn" onclick="restartAnim()">↻ Reiniciar</button></div>
<div class="code-block"><button class="btn copy-btn" onclick="copyCode()">📋 Copiar</button><pre><code id="code-display"></code></pre></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

<script>
let currentTween = null;
const stage = document.getElementById('demo-stage');
function copyCode() { navigator.clipboard.writeText(document.getElementById('code-display').textContent); }

function restartAnim() {
    gsap.killTweensOf('*');
    const box = document.getElementById('snap-box');
    gsap.set(box, { x: 0, y: 0 });
    const points = document.querySelectorAll('.snap-point');
    let isDragging = false, startX = 0, curX = 0;
    const snapPositions = Array.from(points).map(p => p.offsetLeft - stage.offsetLeft + 2);
    box.onmousedown = (e) => {
        isDragging = true;
        startX = e.clientX - curX;
        box.style.cursor = 'grabbing';
        e.preventDefault();
    };
    document.onmousemove = (e) => {
        if (!isDragging) return;
        const raw = e.clientX - startX;
        gsap.set(box, { x: raw });
    };
    document.onmouseup = () => {
        if (!isDragging) return;
        isDragging = false;
        box.style.cursor = 'grab';
        const current = gsap.getProperty(box, 'x');
        const closest = snapPositions.reduce((a, b) => Math.abs(b - current) < Math.abs(a - current) ? b : a);
        curX = closest;
        gsap.to(box, { x: closest, duration: 0.4, ease: 'back.out(2)' });
        points.forEach((p, i) => p.style.borderColor = snapPositions[i] === closest ? 'var(--accent)' : 'var(--border-1)');
    };
    document.getElementById('code-display').textContent = `// Draggable con snap (con plugin):
Draggable.create(".caja", {
  type: "x",
  snap: {
    x: [0, 100, 200, 300]  // posiciones de snap
  },
  onSnap: function() {
    console.log("snapped a:", this.x);
  }
});`;
}

if (typeof restartAnim === 'function') restartAnim();
</script></body></html>
