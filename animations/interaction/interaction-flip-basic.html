<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
    <title>Flip básico — GSAP Visual Codex</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-1: #0d0f10; --bg-2: #1a1d20; --bg-3: #252a30;
            --text-1: #e4e8ec; --text-2: #a1a9b3;
            --accent: #88ce02; --coral: #ff5e7a; --border-1: #2d3339;
            --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }
        body { font-family: var(--font-body); background: var(--bg-1); color: var(--text-1); }
        .page { max-width: 1000px; margin: 0 auto; padding: 2rem; }
        .back { color: var(--text-2); text-decoration: none; display: inline-block; margin-bottom: 1.5rem; padding: 0.4rem 1rem; border: 1px solid var(--border-1); border-radius: 8px; transition: all 0.2s; }
        .back:hover { color: var(--accent); border-color: var(--accent); }
        h1 { font-size: 2rem; color: var(--accent); margin-bottom: 0.5rem; font-family: var(--font-mono); }
        .subtitle { color: var(--text-2); margin-bottom: 2rem; }
        .stage-wrapper { background: var(--bg-2); border-radius: 12px; border: 1px solid var(--border-1); overflow: hidden; margin-bottom: 1rem; }
        #demo-stage { min-height: 300px; display: flex; align-items: center; justify-content: center; padding: 2rem; flex-wrap: wrap; gap: 1rem; position: relative; }
        .controls-bar { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }
        .btn { padding: 0.5rem 1.5rem; border-radius: 8px; border: 1px solid var(--border-1); background: var(--bg-2); color: var(--text-1); cursor: pointer; transition: all 0.2s; font-family: var(--font-body); }
        .btn:hover { border-color: var(--accent); color: var(--accent); }
        .panel { background: var(--bg-2); border-radius: 12px; border: 1px solid var(--border-1); padding: 1.5rem; margin-bottom: 2rem; }
        .panel h3 { color: var(--accent); margin-bottom: 1rem; font-size: 0.85rem; letter-spacing: 0.1em; text-transform: uppercase; }
        .control-row { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.75rem; }
        .control-row label { min-width: 130px; font-size: 0.85rem; color: var(--text-2); }
        .control-row input[type=range] { flex: 1; accent-color: var(--accent); }
        .control-row select { padding: 0.25rem 0.5rem; background: var(--bg-3); color: var(--text-1); border: 1px solid var(--border-1); border-radius: 4px; flex: 1; }
        .val { min-width: 50px; font-family: var(--font-mono); font-size: 0.85rem; color: var(--accent); }
        .code-block { background: #1e1e2e; border-radius: 12px; border: 1px solid var(--border-1); padding: 1.5rem; margin-bottom: 2rem; }
        pre { overflow-x: auto; }
        code { font-family: var(--font-mono); font-size: 0.9rem; color: #cdd6f4; white-space: pre; }
        .copy-btn { margin-bottom: 1rem; }
    </style>
</head>
<body>
<div class="page">
    <a href="../../todas-las-animaciones.html" class="back">← Volver</a>
    <h1>Flip básico</h1>
    <p class="subtitle">Anima transiciones de layout con GSAP Flip</p>
    
<div class="stage-wrapper"><div id="demo-stage" style="flex-direction:column;gap:1rem;">
  <div id="container-a" style="display:flex;gap:1rem;background:var(--bg-3);padding:1rem;border-radius:8px;min-height:80px;align-items:center;width:100%;justify-content:flex-start;">
    <div class="flip-box" data-id="1" style="width:60px;height:60px;background:#88ce02;border-radius:8px;display:grid;place-items:center;font-weight:700;color:#000;cursor:pointer;">1</div>
    <div class="flip-box" data-id="2" style="width:60px;height:60px;background:#ff5e7a;border-radius:8px;display:grid;place-items:center;font-weight:700;color:#fff;cursor:pointer;">2</div>
    <div class="flip-box" data-id="3" style="width:60px;height:60px;background:#4fc3f7;border-radius:8px;display:grid;place-items:center;font-weight:700;color:#fff;cursor:pointer;">3</div>
  </div>
  <p style="color:var(--text-2);font-size:0.85rem;">↓ Haz clic en las cajas para mezclarlas ↓</p>
  <div id="container-b" style="display:flex;gap:1rem;background:var(--bg-3);padding:1rem;border-radius:8px;min-height:80px;align-items:center;width:100%;justify-content:flex-end;flex-wrap:wrap;"></div>
</div></div>
<div class="controls-bar"><button class="btn" onclick="restartAnim()">↻ Reiniciar</button></div>
<div class="code-block"><button class="btn copy-btn" onclick="copyCode()">📋 Copiar</button><pre><code id="code-display"></code></pre></div>

</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

<script>
let currentTween = null;
const stage = document.getElementById('demo-stage');


function restartAnim() {
    gsap.killTweensOf('*');
    const containerA = document.getElementById('container-a');
    const containerB = document.getElementById('container-b');
    // Mover todas las cajas de regreso a A
    containerB.querySelectorAll('.flip-box').forEach(b => containerA.appendChild(b));
    // Configurar clicks
    document.querySelectorAll('.flip-box').forEach(box => {
        box.onclick = () => {
            const fromA = containerA.contains(box);
            const target = fromA ? containerB : containerA;
            // FLIP manual: capturar posición antes
            const beforeRect = box.getBoundingClientRect();
            target.appendChild(box);
            const afterRect = box.getBoundingClientRect();
            const dx = beforeRect.left - afterRect.left;
            const dy = beforeRect.top - afterRect.top;
            gsap.fromTo(box, { x: dx, y: dy }, { x: 0, y: 0, duration: 0.5, ease: 'power3.out' });
        };
    });
    document.getElementById('code-display').textContent = `// Con Flip plugin:
gsap.registerPlugin(Flip);

// 1. Capturar estado antes del cambio
const state = Flip.getState(".cajas");

// 2. Hacer el cambio de DOM/CSS
contenedor.appendChild(caja);

// 3. Animar la transición
Flip.from(state, {
  duration: 0.5,
  ease: "power3.out",
  stagger: 0.05
});`;
}


function copyCode() {
    navigator.clipboard.writeText(document.getElementById('code-display').textContent);
}

if (typeof restartAnim === 'function') restartAnim();
</script>
</body>
</html>
