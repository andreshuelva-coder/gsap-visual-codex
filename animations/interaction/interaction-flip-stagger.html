<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Flip con stagger — GSAP Visual Codex</title><style>* { margin: 0; padding: 0; box-sizing: border-box; }
:root { --bg-1: #0d0f10; --bg-2: #1a1d20; --bg-3: #252a30; --text-1: #e4e8ec; --text-2: #a1a9b3; --accent: #88ce02; --coral: #ff5e7a; --border-1: #2d3339; --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; --font-mono: 'JetBrains Mono', monospace; }
body { font-family: var(--font-body); background: var(--bg-1); color: var(--text-1); }
.page { max-width: 1000px; margin: 0 auto; padding: 2rem; }
.back { color: var(--text-2); text-decoration: none; display: inline-block; margin-bottom: 1.5rem; padding: 0.4rem 1rem; border: 1px solid var(--border-1); border-radius: 8px; }
.back:hover { color: var(--accent); border-color: var(--accent); }
h1 { font-size: 2rem; color: var(--accent); margin-bottom: 0.5rem; font-family: var(--font-mono); }
.subtitle { color: var(--text-2); margin-bottom: 2rem; }
.stage-wrapper { background: var(--bg-2); border-radius: 12px; border: 1px solid var(--border-1); overflow: hidden; margin-bottom: 1rem; }
#demo-stage { min-height: 300px; display: flex; align-items: center; justify-content: center; padding: 2rem; flex-wrap: wrap; gap: 1rem; position: relative; }
.controls-bar { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }
.btn { padding: 0.5rem 1.5rem; border-radius: 8px; border: 1px solid var(--border-1); background: var(--bg-2); color: var(--text-1); cursor: pointer; transition: all 0.2s; font-family: var(--font-body); }
.btn:hover { border-color: var(--accent); color: var(--accent); }
.panel { background: var(--bg-2); border-radius: 12px; border: 1px solid var(--border-1); padding: 1.5rem; margin-bottom: 2rem; }
.panel h3 { color: var(--accent); margin-bottom: 1rem; font-size: 0.85rem; letter-spacing: 0.1em; text-transform: uppercase; }
.control-row { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.75rem; }
.control-row label { min-width: 130px; font-size: 0.85rem; color: var(--text-2); }
.control-row input[type=range] { flex: 1; accent-color: var(--accent); }
.control-row select { padding: 0.25rem 0.5rem; background: var(--bg-3); color: var(--text-1); border: 1px solid var(--border-1); border-radius: 4px; flex: 1; }
.val { min-width: 50px; font-family: var(--font-mono); font-size: 0.85rem; color: var(--accent); }
.code-block { background: #1e1e2e; border-radius: 12px; border: 1px solid var(--border-1); padding: 1.5rem; margin-bottom: 2rem; }
pre { overflow-x: auto; } code { font-family: var(--font-mono); font-size: 0.9rem; color: #cdd6f4; white-space: pre; }
.copy-btn { margin-bottom: 1rem; }</style></head>
<body><div class="page">
<a href="../../todas-las-animaciones.html" class="back">← Volver</a>
<h1>Flip con stagger</h1><p class="subtitle">Anima múltiples elementos con Flip y stagger escalonado</p>
<div class="stage-wrapper"><div id="demo-stage" style="flex-direction:column;gap:1rem;">
<div id="grid-a" style="display:grid;grid-template-columns:repeat(4,70px);gap:0.5rem;"></div>
<p style="color:var(--text-2);font-size:0.85rem;">Haz clic en "Reorganizar" para ver el Flip con stagger</p>
<div id="grid-b" style="display:grid;grid-template-columns:repeat(2,70px);gap:0.5rem;"></div>
</div></div>
<div class="controls-bar"><button class="btn" onclick="reorganize()">🔀 Reorganizar</button><button class="btn" onclick="restartAnim()">↻ Reset</button></div>
<div class="panel"><h3>Panel de control</h3>
<div class="control-row"><label>stagger</label><input type="range" id="c-stagger" min="0.02" max="0.2" step="0.01" value="0.06"><span class="val" id="v-stagger">0.06</span></div>
<div class="control-row"><label>ease</label><select id="c-ease"><option>power3.out</option><option>back.out(1.7)</option><option>power2.out</option></select></div>
</div>
<div class="code-block"><button class="btn copy-btn" onclick="copyCode()">📋 Copiar</button><pre><code id="code-display"></code></pre></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

<script>
let currentTween = null;
const stage = document.getElementById('demo-stage');
function copyCode() { navigator.clipboard.writeText(document.getElementById('code-display').textContent); }

const colors = ['#88ce02','#ff5e7a','#4fc3f7','#ffb74d','#ce93d8','#88ce02','#ff5e7a','#4fc3f7'];
function restartAnim() {
    gsap.killTweensOf('*');
    const gridA = document.getElementById('grid-a');
    const gridB = document.getElementById('grid-b');
    gridB.querySelectorAll('.flip-item').forEach(el => gridA.appendChild(el));
    gridA.innerHTML = '';
    colors.forEach((c, i) => {
        const el = document.createElement('div');
        el.className = 'flip-item';
        el.style.cssText = `width:70px;height:70px;border-radius:8px;background:${c};display:grid;place-items:center;font-family:monospace;font-weight:700;color:#000;font-size:0.9rem;`;
        el.textContent = i+1;
        gridA.appendChild(el);
    });
}
function reorganize() {
    const stagger = parseFloat(document.getElementById('c-stagger').value);
    const ease = document.getElementById('c-ease').value;
    const gridA = document.getElementById('grid-a');
    const gridB = document.getElementById('grid-b');
    const items = [...gridA.querySelectorAll('.flip-item')];
    const beforeRects = items.map(el => el.getBoundingClientRect());
    // Mover mitad a gridB
    const half = items.slice(0, 4);
    half.forEach(el => gridB.appendChild(el));
    items.forEach((el, i) => {
        const before = beforeRects[i];
        const after = el.getBoundingClientRect();
        const dx = before.left - after.left;
        const dy = before.top - after.top;
        gsap.fromTo(el, { x: dx, y: dy }, { x: 0, y: 0, duration: 0.6, ease, delay: i * stagger });
    });
    document.getElementById('code-display').textContent = `// Flip con stagger manual
const state = capturePositions(items);
moveElements(); // cambiar DOM
animateFromState(state, {
  duration: 0.6,
  ease: "${ease}",
  stagger: ${stagger}
});`;
}
document.getElementById('c-stagger').addEventListener('input', function() { document.getElementById('v-stagger').textContent = this.value; });
document.getElementById('c-ease').addEventListener('change', () => {});

if (typeof restartAnim === 'function') restartAnim();
</script></body></html>
