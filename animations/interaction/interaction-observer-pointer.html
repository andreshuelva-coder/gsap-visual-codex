<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
    <title>Observer — seguimiento de cursor — GSAP Visual Codex</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-1: #0d0f10; --bg-2: #1a1d20; --bg-3: #252a30;
            --text-1: #e4e8ec; --text-2: #a1a9b3;
            --accent: #88ce02; --coral: #ff5e7a; --border-1: #2d3339;
            --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }
        body { font-family: var(--font-body); background: var(--bg-1); color: var(--text-1); }
        .page { max-width: 1000px; margin: 0 auto; padding: 2rem; }
        .back { color: var(--text-2); text-decoration: none; display: inline-block; margin-bottom: 1.5rem; padding: 0.4rem 1rem; border: 1px solid var(--border-1); border-radius: 8px; transition: all 0.2s; }
        .back:hover { color: var(--accent); border-color: var(--accent); }
        h1 { font-size: 2rem; color: var(--accent); margin-bottom: 0.5rem; font-family: var(--font-mono); }
        .subtitle { color: var(--text-2); margin-bottom: 2rem; }
        .stage-wrapper { background: var(--bg-2); border-radius: 12px; border: 1px solid var(--border-1); overflow: hidden; margin-bottom: 1rem; }
        #demo-stage { min-height: 300px; display: flex; align-items: center; justify-content: center; padding: 2rem; flex-wrap: wrap; gap: 1rem; position: relative; }
        .controls-bar { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }
        .btn { padding: 0.5rem 1.5rem; border-radius: 8px; border: 1px solid var(--border-1); background: var(--bg-2); color: var(--text-1); cursor: pointer; transition: all 0.2s; font-family: var(--font-body); }
        .btn:hover { border-color: var(--accent); color: var(--accent); }
        .panel { background: var(--bg-2); border-radius: 12px; border: 1px solid var(--border-1); padding: 1.5rem; margin-bottom: 2rem; }
        .panel h3 { color: var(--accent); margin-bottom: 1rem; font-size: 0.85rem; letter-spacing: 0.1em; text-transform: uppercase; }
        .control-row { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.75rem; }
        .control-row label { min-width: 130px; font-size: 0.85rem; color: var(--text-2); }
        .control-row input[type=range] { flex: 1; accent-color: var(--accent); }
        .control-row select { padding: 0.25rem 0.5rem; background: var(--bg-3); color: var(--text-1); border: 1px solid var(--border-1); border-radius: 4px; flex: 1; }
        .val { min-width: 50px; font-family: var(--font-mono); font-size: 0.85rem; color: var(--accent); }
        .code-block { background: #1e1e2e; border-radius: 12px; border: 1px solid var(--border-1); padding: 1.5rem; margin-bottom: 2rem; }
        pre { overflow-x: auto; }
        code { font-family: var(--font-mono); font-size: 0.9rem; color: #cdd6f4; white-space: pre; }
        .copy-btn { margin-bottom: 1rem; }
    </style>
</head>
<body>
<div class="page">
    <a href="../../todas-las-animaciones.html" class="back">← Volver</a>
    <h1>Observer — seguimiento de cursor</h1>
    <p class="subtitle">Detecta movimiento del cursor con GSAP Observer</p>
    
<div class="stage-wrapper"><div id="demo-stage" style="cursor:none;overflow:hidden;">
  <div id="cursor-dot" style="width:20px;height:20px;border-radius:50%;background:#88ce02;position:absolute;transform:translate(-50%,-50%);pointer-events:none;box-shadow:0 0 20px #88ce02;"></div>
  <div id="cursor-ring" style="width:50px;height:50px;border-radius:50%;border:2px solid #88ce02;position:absolute;transform:translate(-50%,-50%);pointer-events:none;opacity:0.5;"></div>
  <p style="color:var(--text-2);font-size:0.9rem;pointer-events:none;">Mueve el cursor aquí</p>
</div></div>
<div class="panel"><h3>Panel de control</h3>
<div class="control-row"><label>lag del ring</label><input type="range" id="c-lag" min="0.05" max="0.5" step="0.01" value="0.15"><span class="val" id="v-lag">0.15</span></div>
</div>
<div class="code-block"><button class="btn copy-btn" onclick="copyCode()">📋 Copiar</button><pre><code id="code-display"></code></pre></div>

</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

<script>
let currentTween = null;
const stage = document.getElementById('demo-stage');


let xSet, ySet, xRing, yRing;
function restartAnim() {
    gsap.killTweensOf('*');
    const dot = document.getElementById('cursor-dot');
    const ring = document.getElementById('cursor-ring');
    const lag = parseFloat(document.getElementById('c-lag').value);
    xSet = gsap.quickSetter(dot, 'x', 'px');
    ySet = gsap.quickSetter(dot, 'y', 'px');
    xRing = gsap.quickTo(ring, 'x', { duration: lag, ease: 'power3.out' });
    yRing = gsap.quickTo(ring, 'y', { duration: lag, ease: 'power3.out' });
    stage.addEventListener('mousemove', handleMove);
    document.getElementById('code-display').textContent = `// Cursor personalizado con quickSetter y quickTo
const setX = gsap.quickSetter(".dot", "x", "px");
const setY = gsap.quickSetter(".dot", "y", "px");
const moveRingX = gsap.quickTo(".ring", "x", { duration: ${lag} });
const moveRingY = gsap.quickTo(".ring", "y", { duration: ${lag} });

document.addEventListener("mousemove", (e) => {
  setX(e.clientX);
  setY(e.clientY);
  moveRingX(e.clientX);
  moveRingY(e.clientY);
});`;
}
function handleMove(e) {
    const rect = stage.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    if (xSet) xSet(x); if (ySet) ySet(y);
    if (xRing) xRing(x); if (yRing) yRing(y);
}
document.getElementById('c-lag').addEventListener('input', function() { document.getElementById('v-lag').textContent = this.value; restartAnim(); });


function copyCode() {
    navigator.clipboard.writeText(document.getElementById('code-display').textContent);
}

if (typeof restartAnim === 'function') restartAnim();
</script>
</body>
</html>
