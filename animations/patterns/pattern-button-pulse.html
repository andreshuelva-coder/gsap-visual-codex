<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Botón con efecto pulse — GSAP Visual Codex</title><style>* { margin: 0; padding: 0; box-sizing: border-box; }
:root { --bg-1: #0d0f10; --bg-2: #1a1d20; --bg-3: #252a30; --text-1: #e4e8ec; --text-2: #a1a9b3; --accent: #88ce02; --coral: #ff5e7a; --border-1: #2d3339; --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; --font-mono: 'JetBrains Mono', monospace; }
body { font-family: var(--font-body); background: var(--bg-1); color: var(--text-1); }
.page { max-width: 1000px; margin: 0 auto; padding: 2rem; }
.back { color: var(--text-2); text-decoration: none; display: inline-block; margin-bottom: 1.5rem; padding: 0.4rem 1rem; border: 1px solid var(--border-1); border-radius: 8px; }
.back:hover { color: var(--accent); border-color: var(--accent); }
h1 { font-size: 2rem; color: var(--accent); margin-bottom: 0.5rem; font-family: var(--font-mono); }
.subtitle { color: var(--text-2); margin-bottom: 2rem; }
.stage-wrapper { background: var(--bg-2); border-radius: 12px; border: 1px solid var(--border-1); overflow: hidden; margin-bottom: 1rem; }
#demo-stage { min-height: 300px; display: flex; align-items: center; justify-content: center; padding: 2rem; flex-wrap: wrap; gap: 1rem; position: relative; }
.controls-bar { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }
.btn { padding: 0.5rem 1.5rem; border-radius: 8px; border: 1px solid var(--border-1); background: var(--bg-2); color: var(--text-1); cursor: pointer; transition: all 0.2s; font-family: var(--font-body); }
.btn:hover { border-color: var(--accent); color: var(--accent); }
.panel { background: var(--bg-2); border-radius: 12px; border: 1px solid var(--border-1); padding: 1.5rem; margin-bottom: 2rem; }
.panel h3 { color: var(--accent); margin-bottom: 1rem; font-size: 0.85rem; letter-spacing: 0.1em; text-transform: uppercase; }
.control-row { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.75rem; }
.control-row label { min-width: 130px; font-size: 0.85rem; color: var(--text-2); }
.control-row input[type=range] { flex: 1; accent-color: var(--accent); }
.control-row select { padding: 0.25rem 0.5rem; background: var(--bg-3); color: var(--text-1); border: 1px solid var(--border-1); border-radius: 4px; flex: 1; }
.val { min-width: 50px; font-family: var(--font-mono); font-size: 0.85rem; color: var(--accent); }
.code-block { background: #1e1e2e; border-radius: 12px; border: 1px solid var(--border-1); padding: 1.5rem; margin-bottom: 2rem; }
pre { overflow-x: auto; } code { font-family: var(--font-mono); font-size: 0.9rem; color: #cdd6f4; white-space: pre; }
.copy-btn { margin-bottom: 1rem; }</style></head>
<body><div class="page">
<a href="../../todas-las-animaciones.html" class="back">← Volver</a>
<h1>Botón con efecto pulse</h1><p class="subtitle">Botón con animación de pulso continuo para llamar la atención</p>
<div class="stage-wrapper"><div id="demo-stage" style="gap:2rem;">
<button id="pulse-btn" style="padding:1rem 2.5rem;font-size:1.1rem;font-weight:700;background:var(--accent);color:#000;border:none;border-radius:12px;cursor:pointer;position:relative;">
  Llamada a la acción
</button>
<button id="pulse-btn-2" style="padding:1rem 2.5rem;font-size:1.1rem;font-weight:700;background:transparent;color:var(--coral);border:2px solid var(--coral);border-radius:12px;cursor:pointer;position:relative;">
  Urgente ⚠️
</button>
</div></div>
<div class="controls-bar"><button class="btn" onclick="restartAnim()">↻ Reiniciar</button><button class="btn" onclick="gsap.killTweensOf('*')">⏸ Parar</button></div>
<div class="panel"><h3>Panel de control</h3>
<div class="control-row"><label>tipo de pulse</label><select id="c-type"><option value="scale">Scale</option><option value="glow">Glow</option><option value="border">Border</option></select></div>
<div class="control-row"><label>velocidad</label><input type="range" id="c-speed" min="0.3" max="2" step="0.1" value="1"><span class="val" id="v-speed">1</span></div>
</div>
<div class="code-block"><button class="btn copy-btn" onclick="copyCode()">📋 Copiar</button><pre><code id="code-display"></code></pre></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

<script>
let currentTween = null;
const stage = document.getElementById('demo-stage');
function copyCode() { navigator.clipboard.writeText(document.getElementById('code-display').textContent); }

function restartAnim() {
    gsap.killTweensOf('*');
    const type = document.getElementById('c-type').value;
    const speed = parseFloat(document.getElementById('c-speed').value);
    const btn1 = document.getElementById('pulse-btn');
    const btn2 = document.getElementById('pulse-btn-2');
    const dur = 1 / speed;
    if (type === 'scale') {
        gsap.to([btn1, btn2], { scale: 1.08, duration: dur * 0.5, ease: 'power2.inOut', yoyo: true, repeat: -1 });
    } else if (type === 'glow') {
        gsap.to(btn1, { boxShadow: '0 0 30px rgba(136,206,2,0.8)', duration: dur * 0.5, ease: 'sine.inOut', yoyo: true, repeat: -1 });
        gsap.to(btn2, { boxShadow: '0 0 30px rgba(255,94,122,0.8)', duration: dur * 0.5, ease: 'sine.inOut', yoyo: true, repeat: -1 });
    } else {
        gsap.to(btn1, { borderColor: '#88ce02', borderWidth: '4px', duration: dur * 0.4, ease: 'sine.inOut', yoyo: true, repeat: -1 });
        gsap.to(btn2, { borderWidth: '4px', duration: dur * 0.4, ease: 'sine.inOut', yoyo: true, repeat: -1 });
    }
    document.getElementById('code-display').textContent = `// Efecto pulse en botón
gsap.to(".cta-btn", {
  ${type === 'scale' ? `scale: 1.08` : type === 'glow' ? `boxShadow: "0 0 30px rgba(136,206,2,0.8)"` : `borderWidth: "4px"`},
  duration: ${dur * 0.5},
  ease: "sine.inOut",
  yoyo: true,
  repeat: -1
});`;
}
document.getElementById('c-type').addEventListener('change', restartAnim);
document.getElementById('c-speed').addEventListener('input', function() { document.getElementById('v-speed').textContent = this.value; restartAnim(); });

if (typeof restartAnim === 'function') restartAnim();
</script></body></html>
