<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
    <title>Card flip — efecto volteo — GSAP Visual Codex</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-1: #0d0f10; --bg-2: #1a1d20; --bg-3: #252a30;
            --text-1: #e4e8ec; --text-2: #a1a9b3;
            --accent: #88ce02; --coral: #ff5e7a; --border-1: #2d3339;
            --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }
        body { font-family: var(--font-body); background: var(--bg-1); color: var(--text-1); }
        .page { max-width: 1000px; margin: 0 auto; padding: 2rem; }
        .back { color: var(--text-2); text-decoration: none; display: inline-block; margin-bottom: 1.5rem; padding: 0.4rem 1rem; border: 1px solid var(--border-1); border-radius: 8px; }
        .back:hover { color: var(--accent); border-color: var(--accent); }
        h1 { font-size: 2rem; color: var(--accent); margin-bottom: 0.5rem; font-family: var(--font-mono); }
        .subtitle { color: var(--text-2); margin-bottom: 2rem; }
        .stage-wrapper { background: var(--bg-2); border-radius: 12px; border: 1px solid var(--border-1); overflow: hidden; margin-bottom: 1rem; }
        #demo-stage { min-height: 300px; display: flex; align-items: center; justify-content: center; padding: 2rem; flex-wrap: wrap; gap: 1rem; position: relative; }
        .controls-bar { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }
        .btn { padding: 0.5rem 1.5rem; border-radius: 8px; border: 1px solid var(--border-1); background: var(--bg-2); color: var(--text-1); cursor: pointer; transition: all 0.2s; font-family: var(--font-body); }
        .btn:hover { border-color: var(--accent); color: var(--accent); }
        .panel { background: var(--bg-2); border-radius: 12px; border: 1px solid var(--border-1); padding: 1.5rem; margin-bottom: 2rem; }
        .panel h3 { color: var(--accent); margin-bottom: 1rem; font-size: 0.85rem; letter-spacing: 0.1em; text-transform: uppercase; }
        .control-row { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.75rem; }
        .control-row label { min-width: 130px; font-size: 0.85rem; color: var(--text-2); }
        .control-row input[type=range] { flex: 1; accent-color: var(--accent); }
        .control-row select { padding: 0.25rem 0.5rem; background: var(--bg-3); color: var(--text-1); border: 1px solid var(--border-1); border-radius: 4px; flex: 1; }
        .val { min-width: 50px; font-family: var(--font-mono); font-size: 0.85rem; color: var(--accent); }
        .code-block { background: #1e1e2e; border-radius: 12px; border: 1px solid var(--border-1); padding: 1.5rem; margin-bottom: 2rem; }
        pre { overflow-x: auto; }
        code { font-family: var(--font-mono); font-size: 0.9rem; color: #cdd6f4; white-space: pre; }
        .copy-btn { margin-bottom: 1rem; }
        .note { background: var(--bg-3); border: 1px solid var(--coral); border-radius: 8px; padding: 0.75rem 1rem; margin-bottom: 1rem; color: var(--text-2); font-size: 0.85rem; }
        .note strong { color: var(--coral); }
</style>
</head>
<body>
<div class="page">
    <a href="../../todas-las-animaciones.html" class="back">← Volver</a>
    <h1>Card flip — efecto volteo</h1>
    <p class="subtitle">Tarjeta que se voltea al hacer hover mostrando el reverso</p>
    <div class="stage-wrapper"><div id="demo-stage" style="perspective:1000px;">
<div id="card-container" style="width:200px;height:280px;position:relative;transform-style:preserve-3d;cursor:pointer;">
  <div id="card-front" style="position:absolute;inset:0;background:linear-gradient(135deg,#1a1d20,#252a30);border:1px solid #2d3339;border-radius:16px;display:grid;place-items:center;backface-visibility:hidden;">
    <div style="text-align:center;"><div style="font-size:3rem;">🎴</div><p style="color:var(--accent);font-weight:700;margin-top:0.5rem;">Haz hover</p></div>
  </div>
  <div id="card-back" style="position:absolute;inset:0;background:linear-gradient(135deg,#88ce02,#5a8a01);border-radius:16px;display:grid;place-items:center;backface-visibility:hidden;transform:rotateY(180deg);">
    <div style="text-align:center;padding:1rem;"><div style="font-size:2rem;">✨</div><p style="color:#000;font-weight:700;font-size:0.9rem;margin-top:0.5rem;">¡Reverso!</p></div>
  </div>
</div>
</div></div>
<div class="controls-bar"><button class="btn" onclick="restartAnim()">↻ Reiniciar</button></div>
<div class="panel"><h3>Panel de control</h3>
<div class="control-row"><label>trigger</label><select id="c-trigger"><option value="hover">Hover</option><option value="click">Click</option></select></div>
<div class="control-row"><label>duration</label><input type="range" id="c-dur" min="0.2" max="1.5" step="0.05" value="0.6"><span class="val" id="v-dur">0.6</span></div>
</div>
<div class="code-block"><button class="btn copy-btn" onclick="copyCode()">📋 Copiar</button><pre><code id="code-display"></code></pre></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

<script>
let currentTween = null;
const stage = document.getElementById('demo-stage');
function copyCode() { navigator.clipboard.writeText(document.getElementById('code-display').textContent); }

let isFlipped = false;
function restartAnim() {
    gsap.killTweensOf('*');
    isFlipped = false;
    const card = document.getElementById('card-container');
    const dur = parseFloat(document.getElementById('c-dur').value);
    const trigger = document.getElementById('c-trigger').value;
    gsap.set(card, { rotateY: 0 });
    card.onmouseenter = card.onmouseleave = card.onclick = null;
    const flipCard = () => {
        isFlipped = !isFlipped;
        gsap.to(card, { rotateY: isFlipped ? 180 : 0, duration: dur, ease: 'power2.inOut' });
    };
    if (trigger === 'hover') {
        card.onmouseenter = () => gsap.to(card, { rotateY: 180, duration: dur, ease: 'power2.inOut' });
        card.onmouseleave = () => gsap.to(card, { rotateY: 0, duration: dur, ease: 'power2.inOut' });
    } else {
        card.onclick = flipCard;
    }
    document.getElementById('code-display').textContent = `// Card flip con GSAP
const card = document.querySelector(".card");
let isFlipped = false;

card.addEventListener("click", () => {
  isFlipped = !isFlipped;
  gsap.to(card, {
    rotateY: isFlipped ? 180 : 0,
    duration: ${dur},
    ease: "power2.inOut"
  });
});`;
}
document.getElementById('c-trigger').addEventListener('change', restartAnim);
document.getElementById('c-dur').addEventListener('input', function() { document.getElementById('v-dur').textContent = this.value; restartAnim(); });

if (typeof restartAnim === 'function') restartAnim();
</script>
</body>
</html>
