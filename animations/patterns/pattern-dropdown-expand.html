<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Dropdown animado — GSAP Visual Codex</title><style>* { margin: 0; padding: 0; box-sizing: border-box; }
:root { --bg-1: #0d0f10; --bg-2: #1a1d20; --bg-3: #252a30; --text-1: #e4e8ec; --text-2: #a1a9b3; --accent: #88ce02; --coral: #ff5e7a; --border-1: #2d3339; --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; --font-mono: 'JetBrains Mono', monospace; }
body { font-family: var(--font-body); background: var(--bg-1); color: var(--text-1); }
.page { max-width: 1000px; margin: 0 auto; padding: 2rem; }
.back { color: var(--text-2); text-decoration: none; display: inline-block; margin-bottom: 1.5rem; padding: 0.4rem 1rem; border: 1px solid var(--border-1); border-radius: 8px; }
.back:hover { color: var(--accent); border-color: var(--accent); }
h1 { font-size: 2rem; color: var(--accent); margin-bottom: 0.5rem; font-family: var(--font-mono); }
.subtitle { color: var(--text-2); margin-bottom: 2rem; }
.stage-wrapper { background: var(--bg-2); border-radius: 12px; border: 1px solid var(--border-1); overflow: hidden; margin-bottom: 1rem; }
#demo-stage { min-height: 300px; display: flex; align-items: center; justify-content: center; padding: 2rem; flex-wrap: wrap; gap: 1rem; position: relative; }
.controls-bar { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }
.btn { padding: 0.5rem 1.5rem; border-radius: 8px; border: 1px solid var(--border-1); background: var(--bg-2); color: var(--text-1); cursor: pointer; transition: all 0.2s; font-family: var(--font-body); }
.btn:hover { border-color: var(--accent); color: var(--accent); }
.panel { background: var(--bg-2); border-radius: 12px; border: 1px solid var(--border-1); padding: 1.5rem; margin-bottom: 2rem; }
.panel h3 { color: var(--accent); margin-bottom: 1rem; font-size: 0.85rem; letter-spacing: 0.1em; text-transform: uppercase; }
.control-row { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.75rem; }
.control-row label { min-width: 130px; font-size: 0.85rem; color: var(--text-2); }
.control-row input[type=range] { flex: 1; accent-color: var(--accent); }
.control-row select { padding: 0.25rem 0.5rem; background: var(--bg-3); color: var(--text-1); border: 1px solid var(--border-1); border-radius: 4px; flex: 1; }
.val { min-width: 50px; font-family: var(--font-mono); font-size: 0.85rem; color: var(--accent); }
.code-block { background: #1e1e2e; border-radius: 12px; border: 1px solid var(--border-1); padding: 1.5rem; margin-bottom: 2rem; }
pre { overflow-x: auto; } code { font-family: var(--font-mono); font-size: 0.9rem; color: #cdd6f4; white-space: pre; }
.copy-btn { margin-bottom: 1rem; }</style></head>
<body><div class="page">
<a href="../../todas-las-animaciones.html" class="back">← Volver</a>
<h1>Dropdown animado</h1><p class="subtitle">Menú desplegable con animación de expansión</p>
<div class="stage-wrapper"><div id="demo-stage" style="flex-direction:column;align-items:flex-start;padding:2rem;gap:0.5rem;">
<div style="position:relative;width:220px;">
  <button id="dropdown-btn" style="width:100%;padding:0.75rem 1rem;background:var(--bg-3);border:1px solid var(--border-1);border-radius:8px;color:var(--text-1);cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-family:var(--font-body);">
    Selecciona una opción <span id="arrow" style="transition:none;">▼</span>
  </button>
  <div id="dropdown-menu" style="position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--bg-2);border:1px solid var(--border-1);border-radius:8px;overflow:hidden;height:0;opacity:0;z-index:10;">
    <div class="dd-item" style="padding:0.65rem 1rem;cursor:pointer;color:var(--text-1);font-size:0.9rem;border-bottom:1px solid var(--border-1);">🏠 Inicio</div>
    <div class="dd-item" style="padding:0.65rem 1rem;cursor:pointer;color:var(--text-1);font-size:0.9rem;border-bottom:1px solid var(--border-1);">📊 Dashboard</div>
    <div class="dd-item" style="padding:0.65rem 1rem;cursor:pointer;color:var(--text-1);font-size:0.9rem;border-bottom:1px solid var(--border-1);">⚙️ Ajustes</div>
    <div class="dd-item" style="padding:0.65rem 1rem;cursor:pointer;color:var(--text-1);font-size:0.9rem;">🚪 Cerrar sesión</div>
  </div>
</div>
</div></div>
<div class="panel"><h3>Panel de control</h3>
<div class="control-row"><label>ease apertura</label><select id="c-ease"><option>power3.out</option><option>back.out(1.7)</option><option>power2.out</option><option>elastic.out(1,0.3)</option></select></div>
</div>
<div class="code-block"><button class="btn copy-btn" onclick="copyCode()">📋 Copiar</button><pre><code id="code-display"></code></pre></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

<script>
let currentTween = null;
const stage = document.getElementById('demo-stage');
function copyCode() { navigator.clipboard.writeText(document.getElementById('code-display').textContent); }

let isOpen = false;
function restartAnim() {
    gsap.killTweensOf('*');
    isOpen = false;
    const btn = document.getElementById('dropdown-btn');
    const menu = document.getElementById('dropdown-menu');
    const arrow = document.getElementById('arrow');
    const ease = document.getElementById('c-ease').value;
    gsap.set(menu, { height: 0, opacity: 0 });
    btn.onclick = () => {
        isOpen = !isOpen;
        if (isOpen) {
            gsap.to(menu, { height: 'auto', opacity: 1, duration: 0.35, ease });
            gsap.to(arrow, { rotation: 180, duration: 0.3 });
        } else {
            gsap.to(menu, { height: 0, opacity: 0, duration: 0.25, ease: 'power2.in' });
            gsap.to(arrow, { rotation: 0, duration: 0.3 });
        }
    };
    document.querySelectorAll('.dd-item').forEach(item => {
        item.onmouseenter = () => gsap.to(item, { backgroundColor: 'var(--bg-3)', paddingLeft: '1.5rem', duration: 0.2 });
        item.onmouseleave = () => gsap.to(item, { backgroundColor: 'transparent', paddingLeft: '1rem', duration: 0.2 });
        item.onclick = () => {
            document.getElementById('dropdown-btn').firstChild.textContent = item.textContent + ' ';
            isOpen = false;
            gsap.to(menu, { height: 0, opacity: 0, duration: 0.25 });
            gsap.to(arrow, { rotation: 0, duration: 0.3 });
        };
    });
    document.getElementById('code-display').textContent = `// Dropdown animado
let isOpen = false;

btn.addEventListener("click", () => {
  isOpen = !isOpen;
  if (isOpen) {
    gsap.to(".menu", { height: "auto", opacity: 1, duration: 0.35, ease: "${ease}" });
    gsap.to(".arrow", { rotation: 180, duration: 0.3 });
  } else {
    gsap.to(".menu", { height: 0, opacity: 0, duration: 0.25, ease: "power2.in" });
    gsap.to(".arrow", { rotation: 0, duration: 0.3 });
  }
});`;
}
document.getElementById('c-ease').addEventListener('change', restartAnim);

if (typeof restartAnim === 'function') restartAnim();
</script></body></html>
