<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Loader — barra de progreso — GSAP Visual Codex</title><style>* { margin: 0; padding: 0; box-sizing: border-box; }
:root { --bg-1: #0d0f10; --bg-2: #1a1d20; --bg-3: #252a30; --text-1: #e4e8ec; --text-2: #a1a9b3; --accent: #88ce02; --coral: #ff5e7a; --border-1: #2d3339; --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; --font-mono: 'JetBrains Mono', monospace; }
body { font-family: var(--font-body); background: var(--bg-1); color: var(--text-1); }
.page { max-width: 1000px; margin: 0 auto; padding: 2rem; }
.back { color: var(--text-2); text-decoration: none; display: inline-block; margin-bottom: 1.5rem; padding: 0.4rem 1rem; border: 1px solid var(--border-1); border-radius: 8px; }
.back:hover { color: var(--accent); border-color: var(--accent); }
h1 { font-size: 2rem; color: var(--accent); margin-bottom: 0.5rem; font-family: var(--font-mono); }
.subtitle { color: var(--text-2); margin-bottom: 2rem; }
.stage-wrapper { background: var(--bg-2); border-radius: 12px; border: 1px solid var(--border-1); overflow: hidden; margin-bottom: 1rem; }
#demo-stage { min-height: 300px; display: flex; align-items: center; justify-content: center; padding: 2rem; flex-wrap: wrap; gap: 1rem; position: relative; }
.controls-bar { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }
.btn { padding: 0.5rem 1.5rem; border-radius: 8px; border: 1px solid var(--border-1); background: var(--bg-2); color: var(--text-1); cursor: pointer; transition: all 0.2s; font-family: var(--font-body); }
.btn:hover { border-color: var(--accent); color: var(--accent); }
.panel { background: var(--bg-2); border-radius: 12px; border: 1px solid var(--border-1); padding: 1.5rem; margin-bottom: 2rem; }
.panel h3 { color: var(--accent); margin-bottom: 1rem; font-size: 0.85rem; letter-spacing: 0.1em; text-transform: uppercase; }
.control-row { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.75rem; }
.control-row label { min-width: 130px; font-size: 0.85rem; color: var(--text-2); }
.control-row input[type=range] { flex: 1; accent-color: var(--accent); }
.control-row select { padding: 0.25rem 0.5rem; background: var(--bg-3); color: var(--text-1); border: 1px solid var(--border-1); border-radius: 4px; flex: 1; }
.val { min-width: 50px; font-family: var(--font-mono); font-size: 0.85rem; color: var(--accent); }
.code-block { background: #1e1e2e; border-radius: 12px; border: 1px solid var(--border-1); padding: 1.5rem; margin-bottom: 2rem; }
pre { overflow-x: auto; } code { font-family: var(--font-mono); font-size: 0.9rem; color: #cdd6f4; white-space: pre; }
.copy-btn { margin-bottom: 1rem; }</style></head>
<body><div class="page">
<a href="../../todas-las-animaciones.html" class="back">← Volver</a>
<h1>Loader — barra de progreso</h1><p class="subtitle">Barra de progreso animada con porcentaje</p>
<div class="stage-wrapper"><div id="demo-stage" style="flex-direction:column;gap:1.5rem;align-items:stretch;padding:2rem;">
<div style="text-align:center;">
  <span id="percent-label" style="font-size:2rem;font-family:monospace;font-weight:700;color:var(--accent);">0%</span>
  <p style="color:var(--text-2);font-size:0.85rem;margin-top:0.25rem;" id="status-text">Iniciando...</p>
</div>
<div style="width:100%;height:12px;background:var(--border-1);border-radius:6px;overflow:hidden;">
  <div id="prog-bar" style="height:100%;background:linear-gradient(90deg,#88ce02,#5a8a01);width:0%;border-radius:6px;"></div>
</div>
<div id="prog-items" style="display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;"></div>
</div></div>
<div class="controls-bar"><button class="btn" onclick="restartAnim()">↻ Reiniciar</button></div>
<div class="panel"><h3>Panel de control</h3>
<div class="control-row"><label>duración total</label><input type="range" id="c-dur" min="1" max="8" step="0.5" value="4"><span class="val" id="v-dur">4</span></div>
<div class="control-row"><label>ease</label><select id="c-ease"><option>power1.inOut</option><option>none</option><option>power2.in</option></select></div>
</div>
<div class="code-block"><button class="btn copy-btn" onclick="copyCode()">📋 Copiar</button><pre><code id="code-display"></code></pre></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

<script>
let currentTween = null;
const stage = document.getElementById('demo-stage');
function copyCode() { navigator.clipboard.writeText(document.getElementById('code-display').textContent); }

const steps = [
    { label: '📦 Cargando assets', pct: 25 },
    { label: '🔧 Inicializando', pct: 50 },
    { label: '🎨 Aplicando estilos', pct: 75 },
    { label: '✅ Listo', pct: 100 },
];
function restartAnim() {
    gsap.killTweensOf('*');
    const dur = parseFloat(document.getElementById('c-dur').value);
    const ease = document.getElementById('c-ease').value;
    const bar = document.getElementById('prog-bar');
    const label = document.getElementById('percent-label');
    const status = document.getElementById('status-text');
    const items = document.getElementById('prog-items');
    items.innerHTML = steps.map(s => `<div class="prog-item" style="padding:0.5rem;border-radius:6px;background:var(--border-1);color:var(--text-2);font-size:0.8rem;opacity:0.3;">${s.label}</div>`).join('');
    const itemEls = items.querySelectorAll('.prog-item');
    gsap.set(bar, { width: '0%' });
    gsap.set(label, { textContent: '0%' });
    const obj = { val: 0 };
    const tl = gsap.timeline();
    tl.to(obj, {
        val: 100, duration: dur, ease,
        onUpdate: function() {
            const v = Math.round(obj.val);
            bar.style.width = v + '%';
            label.textContent = v + '%';
            const step = steps.findIndex(s => v <= s.pct);
            if (step >= 0) status.textContent = steps[step].label;
            itemEls.forEach((el, i) => {
                el.style.opacity = obj.val >= steps[i].pct ? '1' : '0.3';
                el.style.color = obj.val >= steps[i].pct ? 'var(--accent)' : 'var(--text-2)';
            });
        },
        onComplete: () => { status.textContent = '🎉 ¡Completado!'; }
    });
    currentTween = tl;
    document.getElementById('code-display').textContent = `// Barra de progreso con contador
const obj = { val: 0 };

gsap.to(obj, {
  val: 100,
  duration: ${dur},
  ease: "${ease}",
  onUpdate: function() {
    barEl.style.width = obj.val + "%";
    labelEl.textContent = Math.round(obj.val) + "%";
  },
  onComplete: () => showContent()
});`;
}
['c-dur'].forEach(id => document.getElementById(id)?.addEventListener('input', function() { document.getElementById('v-'+id.slice(2)).textContent = this.value; restartAnim(); }));
document.getElementById('c-ease').addEventListener('change', restartAnim);

if (typeof restartAnim === 'function') restartAnim();
</script></body></html>
