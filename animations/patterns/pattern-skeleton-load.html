<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
    <title>Skeleton Screen — GSAP Visual Codex</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-1: #0d0f10; --bg-2: #1a1d20; --bg-3: #252a30;
            --text-1: #e4e8ec; --text-2: #a1a9b3;
            --accent: #88ce02; --coral: #ff5e7a; --border-1: #2d3339;
            --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }
        body { font-family: var(--font-body); background: var(--bg-1); color: var(--text-1); }
        .page { max-width: 1000px; margin: 0 auto; padding: 2rem; }
        .back { color: var(--text-2); text-decoration: none; display: inline-block; margin-bottom: 1.5rem; padding: 0.4rem 1rem; border: 1px solid var(--border-1); border-radius: 8px; }
        .back:hover { color: var(--accent); border-color: var(--accent); }
        h1 { font-size: 2rem; color: var(--accent); margin-bottom: 0.5rem; font-family: var(--font-mono); }
        .subtitle { color: var(--text-2); margin-bottom: 2rem; }
        .stage-wrapper { background: var(--bg-2); border-radius: 12px; border: 1px solid var(--border-1); overflow: hidden; margin-bottom: 1rem; }
        #demo-stage { min-height: 300px; display: flex; align-items: center; justify-content: center; padding: 2rem; flex-wrap: wrap; gap: 1rem; position: relative; }
        .controls-bar { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }
        .btn { padding: 0.5rem 1.5rem; border-radius: 8px; border: 1px solid var(--border-1); background: var(--bg-2); color: var(--text-1); cursor: pointer; transition: all 0.2s; font-family: var(--font-body); }
        .btn:hover { border-color: var(--accent); color: var(--accent); }
        .panel { background: var(--bg-2); border-radius: 12px; border: 1px solid var(--border-1); padding: 1.5rem; margin-bottom: 2rem; }
        .panel h3 { color: var(--accent); margin-bottom: 1rem; font-size: 0.85rem; letter-spacing: 0.1em; text-transform: uppercase; }
        .control-row { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.75rem; }
        .control-row label { min-width: 130px; font-size: 0.85rem; color: var(--text-2); }
        .control-row input[type=range] { flex: 1; accent-color: var(--accent); }
        .control-row select { padding: 0.25rem 0.5rem; background: var(--bg-3); color: var(--text-1); border: 1px solid var(--border-1); border-radius: 4px; flex: 1; }
        .val { min-width: 50px; font-family: var(--font-mono); font-size: 0.85rem; color: var(--accent); }
        .code-block { background: #1e1e2e; border-radius: 12px; border: 1px solid var(--border-1); padding: 1.5rem; margin-bottom: 2rem; }
        pre { overflow-x: auto; }
        code { font-family: var(--font-mono); font-size: 0.9rem; color: #cdd6f4; white-space: pre; }
        .copy-btn { margin-bottom: 1rem; }
        .note { background: var(--bg-3); border: 1px solid var(--coral); border-radius: 8px; padding: 0.75rem 1rem; margin-bottom: 1rem; color: var(--text-2); font-size: 0.85rem; }
        .note strong { color: var(--coral); }
</style>
</head>
<body>
<div class="page">
    <a href="../../todas-las-animaciones.html" class="back">← Volver</a>
    <h1>Skeleton Screen</h1>
    <p class="subtitle">Placeholders animados mientras carga el contenido</p>
    <div class="stage-wrapper"><div id="demo-stage" style="flex-direction:column;gap:1rem;align-items:stretch;padding:2rem;">
<div id="skeleton-card" style="background:var(--bg-3);border-radius:12px;padding:1.5rem;border:1px solid var(--border-1);">
  <div style="display:flex;gap:1rem;align-items:center;margin-bottom:1rem;">
    <div class="skel" style="width:50px;height:50px;border-radius:50%;background:var(--border-1);flex-shrink:0;"></div>
    <div style="flex:1;display:flex;flex-direction:column;gap:0.5rem;">
      <div class="skel" style="height:14px;background:var(--border-1);border-radius:4px;width:60%;"></div>
      <div class="skel" style="height:12px;background:var(--border-1);border-radius:4px;width:40%;"></div>
    </div>
  </div>
  <div class="skel" style="height:12px;background:var(--border-1);border-radius:4px;margin-bottom:0.5rem;"></div>
  <div class="skel" style="height:12px;background:var(--border-1);border-radius:4px;width:85%;margin-bottom:0.5rem;"></div>
  <div class="skel" style="height:12px;background:var(--border-1);border-radius:4px;width:70%;"></div>
</div>
</div></div>
<div class="controls-bar"><button class="btn" onclick="restartAnim()">↻ Reiniciar shimmer</button><button class="btn" onclick="loadContent()">✓ Simular carga completa</button></div>
<div class="code-block"><button class="btn copy-btn" onclick="copyCode()">📋 Copiar</button><pre><code id="code-display"></code></pre></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

<script>
let currentTween = null;
const stage = document.getElementById('demo-stage');
function copyCode() { navigator.clipboard.writeText(document.getElementById('code-display').textContent); }

function restartAnim() {
    gsap.killTweensOf('.skel');
    const skels = document.querySelectorAll('.skel');
    gsap.to(skels, {
        opacity: 0.3, duration: 0.8, ease: 'sine.inOut',
        stagger: { each: 0.1, yoyo: true, repeat: -1 }
    });
    document.getElementById('code-display').textContent = `// Skeleton shimmer effect
const skeletons = document.querySelectorAll(".skeleton");

gsap.to(skeletons, {
  opacity: 0.3,
  duration: 0.8,
  ease: "sine.inOut",
  stagger: { each: 0.1, yoyo: true, repeat: -1 }
});

// Cuando los datos cargan:
function showContent(data) {
  gsap.killTweensOf(".skeleton");
  gsap.to(".skeleton", { opacity: 0, duration: 0.3,
    onComplete: () => renderContent(data)
  });
}`;
}
function loadContent() {
    gsap.killTweensOf('.skel');
    const card = document.getElementById('skeleton-card');
    gsap.to('.skel', { opacity: 0, duration: 0.3, onComplete: () => {
        card.innerHTML = `
            <div style="display:flex;gap:1rem;align-items:center;margin-bottom:1rem;">
                <div style="width:50px;height:50px;border-radius:50%;background:var(--accent);display:grid;place-items:center;font-size:1.5rem;flex-shrink:0;">👤</div>
                <div><p style="font-weight:700;color:var(--text-1);">Juan García</p><p style="color:var(--text-2);font-size:0.85rem;">@juangarcia</p></div>
            </div>
            <p style="color:var(--text-2);line-height:1.6;font-size:0.9rem;">Contenido real cargado desde el servidor. El skeleton se transforma en datos reales con una animación suave.</p>`;
        gsap.from(card.children, { y: 10, opacity: 0, stagger: 0.1, duration: 0.4, ease: 'power2.out' });
    }});
}

if (typeof restartAnim === 'function') restartAnim();
</script>
</body>
</html>
