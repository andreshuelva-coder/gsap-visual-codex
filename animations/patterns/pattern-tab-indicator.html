<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Tab Indicator — GSAP Visual Codex</title><style>* { margin: 0; padding: 0; box-sizing: border-box; }
:root { --bg-1: #0d0f10; --bg-2: #1a1d20; --bg-3: #252a30; --text-1: #e4e8ec; --text-2: #a1a9b3; --accent: #88ce02; --coral: #ff5e7a; --border-1: #2d3339; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg-1); color: var(--text-1); }
.page { max-width: 1200px; margin: 0 auto; padding: 2rem; }
.back { color: var(--text-2); text-decoration: none; display: inline-block; margin-bottom: 1.5rem; padding: 0.4rem 1rem; border: 1px solid var(--border-1); border-radius: 8px; }
.back:hover { color: var(--accent); border-color: var(--accent); }
h1 { font-size: 2rem; color: var(--accent); margin-bottom: 0.5rem; font-family: 'JetBrains Mono', monospace; }
.subtitle { color: var(--text-2); margin-bottom: 2rem; }
.stage-wrapper { background: var(--bg-2); border-radius: 12px; border: 1px solid var(--border-1); overflow: auto; margin-bottom: 1rem; }
#demo-stage { min-height: 400px; display: flex; align-items: center; justify-content: center; padding: 2rem; flex-wrap: wrap; gap: 1rem; position: relative; }
.controls-bar { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }
.btn { padding: 0.5rem 1.5rem; border-radius: 8px; border: 1px solid var(--border-1); background: var(--bg-2); color: var(--text-1); cursor: pointer; }
.btn:hover { border-color: var(--accent); color: var(--accent); }
.panel { background: var(--bg-2); border-radius: 12px; border: 1px solid var(--border-1); padding: 1.5rem; margin-bottom: 2rem; }
.panel h3 { color: var(--accent); margin-bottom: 1rem; font-size: 0.85rem; letter-spacing: 0.1em; text-transform: uppercase; }
.control-row { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.75rem; }
.control-row label { min-width: 100px; font-size: 0.85rem; color: var(--text-2); }
.control-row input[type=range] { flex: 1; accent-color: var(--accent); }
.code-block { background: #1e1e2e; border-radius: 12px; border: 1px solid var(--border-1); padding: 1.5rem; margin-bottom: 2rem; overflow-x: auto; }
pre { overflow-x: auto; } code { font-family: 'JetBrains Mono', monospace; font-size: 0.9rem; color: #cdd6f4; white-space: pre; }
.card { background: var(--bg-3); border: 1px solid var(--border-1); border-radius: 8px; padding: 1.5rem; margin-bottom: 1rem; cursor: pointer; transition: all 0.3s; }
.card:hover { border-color: var(--accent); box-shadow: 0 0 20px rgba(136,206,2,0.2); transform: translateY(-2px); }</style></head>
<body><div class="page">
<a href="../../todas-las-animaciones.html" class="back">← Volver</a>
<h1>Tab Indicator</h1><p class="subtitle">Indicador de tabs animado</p>
<div class="stage-wrapper"><div id="demo-stage" style="flex-direction:column;"></div></div>
<div class="code-block"><button class="btn" onclick="copyCode()">📋 Copiar</button><pre><code id="code-display"></code></pre></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

<script>
let currentTween = null;
const stage = document.getElementById('demo-stage');
function copyCode() { navigator.clipboard.writeText(document.getElementById('code-display').textContent); }
function restartAnim(){gsap.killTweensOf('*');stage.innerHTML='<div style="position:relative;border-bottom:2px solid var(--border-1);margin-bottom:2rem;"><div style="display:flex;gap:2rem;"><button onclick="updateIndicator(0)" style="background:none;border:none;padding:0.75rem 0;color:var(--accent);cursor:pointer;font-weight:700;">Tab 1</button><button onclick="updateIndicator(1)" style="background:none;border:none;padding:0.75rem 0;color:var(--text-2);cursor:pointer;">Tab 2</button><button onclick="updateIndicator(2)" style="background:none;border:none;padding:0.75rem 0;color:var(--text-2);cursor:pointer;">Tab 3</button></div><div id="indicator" style="position:absolute;bottom:-2px;left:0;width:60px;height:2px;background:var(--accent);"></div></div>';window.updateIndicator=function(idx){const buttons=stage.querySelectorAll('button');const indicator=document.getElementById('indicator');const targetBtn=buttons[idx];gsap.to(indicator,{left:targetBtn.offsetLeft,width:targetBtn.offsetWidth,duration:0.3,ease:'power2.out'});buttons.forEach((btn,i)=>{gsap.to(btn,{color:i===idx?'var(--accent)':'var(--text-2)',duration:0.3});});};setTimeout(()=>updateIndicator(0),100);document.getElementById('code-display').textContent=`gsap.to("#indicator",{
  left:targetBtn.offsetLeft,
  width:targetBtn.offsetWidth,
  duration:0.3
});`;}
if (typeof restartAnim === 'function') restartAnim();
</script></body></html>
