<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Tabs con transición animada — GSAP Visual Codex</title><style>* { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --bg-1: #0d0f10; --bg-2: #1a1d20; --bg-3: #252a30; --text-1: #e4e8ec; --text-2: #a1a9b3; --accent: #88ce02; --coral: #ff5e7a; --border-1: #2d3339; --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; --font-mono: 'JetBrains Mono', monospace; }
        body { font-family: var(--font-body); background: var(--bg-1); color: var(--text-1); }
        .page { max-width: 1000px; margin: 0 auto; padding: 2rem; }
        .back { color: var(--text-2); text-decoration: none; display: inline-block; margin-bottom: 1.5rem; padding: 0.4rem 1rem; border: 1px solid var(--border-1); border-radius: 8px; }
        .back:hover { color: var(--accent); border-color: var(--accent); }
        h1 { font-size: 2rem; color: var(--accent); margin-bottom: 0.5rem; font-family: var(--font-mono); }
        .subtitle { color: var(--text-2); margin-bottom: 2rem; }
        .stage-wrapper { background: var(--bg-2); border-radius: 12px; border: 1px solid var(--border-1); overflow: hidden; margin-bottom: 1rem; }
        #demo-stage { min-height: 300px; display: flex; align-items: center; justify-content: center; padding: 2rem; flex-wrap: wrap; gap: 1rem; position: relative; }
        .controls-bar { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }
        .btn { padding: 0.5rem 1.5rem; border-radius: 8px; border: 1px solid var(--border-1); background: var(--bg-2); color: var(--text-1); cursor: pointer; transition: all 0.2s; font-family: var(--font-body); }
        .btn:hover { border-color: var(--accent); color: var(--accent); }
        .panel { background: var(--bg-2); border-radius: 12px; border: 1px solid var(--border-1); padding: 1.5rem; margin-bottom: 2rem; }
        .panel h3 { color: var(--accent); margin-bottom: 1rem; font-size: 0.85rem; letter-spacing: 0.1em; text-transform: uppercase; }
        .control-row { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.75rem; }
        .control-row label { min-width: 130px; font-size: 0.85rem; color: var(--text-2); }
        .control-row input[type=range] { flex: 1; accent-color: var(--accent); }
        .control-row select { padding: 0.25rem 0.5rem; background: var(--bg-3); color: var(--text-1); border: 1px solid var(--border-1); border-radius: 4px; flex: 1; }
        .val { min-width: 50px; font-family: var(--font-mono); font-size: 0.85rem; color: var(--accent); }
        .code-block { background: #1e1e2e; border-radius: 12px; border: 1px solid var(--border-1); padding: 1.5rem; margin-bottom: 2rem; }
        pre { overflow-x: auto; } code { font-family: var(--font-mono); font-size: 0.9rem; color: #cdd6f4; white-space: pre; }
        .copy-btn { margin-bottom: 1rem; }</style></head>
<body><div class="page">
<a href="../../todas-las-animaciones.html" class="back">← Volver</a>
<h1>Tabs con transición animada</h1><p class="subtitle">Cambio de tabs con animación de contenido</p>

<div class="stage-wrapper"><div id="demo-stage" style="flex-direction:column;align-items:stretch;gap:0;">
  <div id="tab-bar" style="display:flex;border-bottom:1px solid var(--border-1);"></div>
  <div id="tab-content" style="padding:1.5rem;min-height:150px;position:relative;"></div>
</div></div>
<div class="panel"><h3>Panel de control</h3>
<div class="control-row"><label>transición</label><select id="c-trans"><option value="fade">Fade</option><option value="slide">Slide horizontal</option><option value="scale">Scale</option></select></div>
</div>
<div class="code-block"><button class="btn copy-btn" onclick="copyCode()">📋 Copiar</button><pre><code id="code-display"></code></pre></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

<script>
let currentTween = null;
const stage = document.getElementById('demo-stage');
function copyCode() { navigator.clipboard.writeText(document.getElementById('code-display').textContent); }

const tabs = [
    { label: 'Inicio', content: '🏠 Contenido de la pestaña Inicio. Aquí va el contenido principal de la página.', color: '#88ce02' },
    { label: 'Perfil', content: '👤 Información del perfil del usuario. Nombre, email y preferencias.', color: '#ff5e7a' },
    { label: 'Config', content: '⚙️ Panel de configuración. Ajusta tus preferencias del sistema.', color: '#4fc3f7' },
];
let activeTab = 0;

function restartAnim() {
    gsap.killTweensOf('*');
    const bar = document.getElementById('tab-bar');
    const content = document.getElementById('tab-content');
    const trans = document.getElementById('c-trans').value;
    bar.innerHTML = '';
    tabs.forEach((tab, i) => {
        const btn = document.createElement('button');
        btn.textContent = tab.label;
        btn.style.cssText = `padding:0.75rem 1.5rem;border:none;background:transparent;color:${i === activeTab ? tab.color : 'var(--text-2)'};cursor:pointer;border-bottom:2px solid ${i === activeTab ? tab.color : 'transparent'};font-family:var(--font-body);font-size:0.9rem;transition:all 0.2s;`;
        btn.onclick = () => switchTab(i, trans);
        bar.appendChild(btn);
    });
    content.innerHTML = `<p style="color:var(--text-2);">${tabs[activeTab].content}</p>`;
    document.getElementById('code-display').textContent = `// Cambio de tabs con GSAP
function switchTab(newTab) {
  const content = document.getElementById("content");
  gsap.to(content, {
    opacity: 0, y: -10, duration: 0.2,
    onComplete: () => {
      content.innerHTML = tabs[newTab].content;
      gsap.fromTo(content,
        { opacity: 0, y: 10 },
        { opacity: 1, y: 0, duration: 0.3, ease: "power2.out" }
      );
    }
  });
}`;
}

function switchTab(index, trans) {
    const content = document.getElementById('tab-content');
    const animations = {
        fade: [{ opacity: 0, duration: 0.15 }, { opacity: 0 }, { opacity: 1, duration: 0.3, ease: 'power2.out' }],
        slide: [{ x: -20, opacity: 0, duration: 0.15 }, { x: 20, opacity: 0 }, { x: 0, opacity: 1, duration: 0.3, ease: 'power2.out' }],
        scale: [{ scale: 0.95, opacity: 0, duration: 0.15 }, { scale: 1.05, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.3, ease: 'back.out(1.7)' }],
    };
    const [out, startState, inAnim] = animations[trans];
    activeTab = index;
    gsap.to(content, { ...out, onComplete: () => {
        content.innerHTML = `<p style="color:var(--text-2);">${tabs[index].content}</p>`;
        gsap.fromTo(content, startState, inAnim);
    }});
    const bar = document.getElementById('tab-bar');
    bar.querySelectorAll('button').forEach((btn, i) => {
        btn.style.color = i === index ? tabs[i].color : 'var(--text-2)';
        btn.style.borderBottomColor = i === index ? tabs[i].color : 'transparent';
        btn.onclick = () => switchTab(i, document.getElementById('c-trans').value);
    });
}
document.getElementById('c-trans').addEventListener('change', restartAnim);

if (typeof restartAnim === 'function') restartAnim();
</script></body></html>
