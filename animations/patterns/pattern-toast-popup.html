<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
    <title>Toast / Notificación — GSAP Visual Codex</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-1: #0d0f10; --bg-2: #1a1d20; --bg-3: #252a30;
            --text-1: #e4e8ec; --text-2: #a1a9b3;
            --accent: #88ce02; --coral: #ff5e7a; --border-1: #2d3339;
            --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }
        body { font-family: var(--font-body); background: var(--bg-1); color: var(--text-1); }
        .page { max-width: 1000px; margin: 0 auto; padding: 2rem; }
        .back { color: var(--text-2); text-decoration: none; display: inline-block; margin-bottom: 1.5rem; padding: 0.4rem 1rem; border: 1px solid var(--border-1); border-radius: 8px; }
        .back:hover { color: var(--accent); border-color: var(--accent); }
        h1 { font-size: 2rem; color: var(--accent); margin-bottom: 0.5rem; font-family: var(--font-mono); }
        .subtitle { color: var(--text-2); margin-bottom: 2rem; }
        .stage-wrapper { background: var(--bg-2); border-radius: 12px; border: 1px solid var(--border-1); overflow: hidden; margin-bottom: 1rem; }
        #demo-stage { min-height: 300px; display: flex; align-items: center; justify-content: center; padding: 2rem; flex-wrap: wrap; gap: 1rem; position: relative; }
        .controls-bar { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }
        .btn { padding: 0.5rem 1.5rem; border-radius: 8px; border: 1px solid var(--border-1); background: var(--bg-2); color: var(--text-1); cursor: pointer; transition: all 0.2s; font-family: var(--font-body); }
        .btn:hover { border-color: var(--accent); color: var(--accent); }
        .panel { background: var(--bg-2); border-radius: 12px; border: 1px solid var(--border-1); padding: 1.5rem; margin-bottom: 2rem; }
        .panel h3 { color: var(--accent); margin-bottom: 1rem; font-size: 0.85rem; letter-spacing: 0.1em; text-transform: uppercase; }
        .control-row { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.75rem; }
        .control-row label { min-width: 130px; font-size: 0.85rem; color: var(--text-2); }
        .control-row input[type=range] { flex: 1; accent-color: var(--accent); }
        .control-row select { padding: 0.25rem 0.5rem; background: var(--bg-3); color: var(--text-1); border: 1px solid var(--border-1); border-radius: 4px; flex: 1; }
        .val { min-width: 50px; font-family: var(--font-mono); font-size: 0.85rem; color: var(--accent); }
        .code-block { background: #1e1e2e; border-radius: 12px; border: 1px solid var(--border-1); padding: 1.5rem; margin-bottom: 2rem; }
        pre { overflow-x: auto; }
        code { font-family: var(--font-mono); font-size: 0.9rem; color: #cdd6f4; white-space: pre; }
        .copy-btn { margin-bottom: 1rem; }
        .note { background: var(--bg-3); border: 1px solid var(--coral); border-radius: 8px; padding: 0.75rem 1rem; margin-bottom: 1rem; color: var(--text-2); font-size: 0.85rem; }
        .note strong { color: var(--coral); }
</style>
</head>
<body>
<div class="page">
    <a href="../../todas-las-animaciones.html" class="back">← Volver</a>
    <h1>Toast / Notificación</h1>
    <p class="subtitle">Notificación que aparece y desaparece automáticamente</p>
    <div class="stage-wrapper"><div id="demo-stage" style="position:relative;overflow:hidden;flex-direction:column;gap:1rem;">
  <button id="show-toast" style="padding:0.75rem 2rem;background:var(--accent);color:#000;border:none;border-radius:8px;cursor:pointer;font-weight:700;">Mostrar notificación</button>
  <div id="toast-container" style="position:absolute;top:1rem;right:1rem;display:flex;flex-direction:column;gap:0.5rem;pointer-events:none;"></div>
</div></div>
<div class="panel"><h3>Panel de control</h3>
<div class="control-row"><label>tipo</label><select id="c-type"><option value="success">✅ Éxito</option><option value="error">❌ Error</option><option value="info">ℹ️ Info</option><option value="warning">⚠️ Aviso</option></select></div>
<div class="control-row"><label>duración visible</label><input type="range" id="c-dur" min="1" max="5" step="0.5" value="3"><span class="val" id="v-dur">3</span></div>
</div>
<div class="code-block"><button class="btn copy-btn" onclick="copyCode()">📋 Copiar</button><pre><code id="code-display"></code></pre></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

<script>
let currentTween = null;
const stage = document.getElementById('demo-stage');
function copyCode() { navigator.clipboard.writeText(document.getElementById('code-display').textContent); }

function showToast(type, duration) {
    const container = document.getElementById('toast-container');
    const configs = {
        success: { icon: '✅', text: 'Operación exitosa', bg: '#88ce02', color: '#000' },
        error: { icon: '❌', text: 'Ha ocurrido un error', bg: '#ff5e7a', color: '#fff' },
        info: { icon: 'ℹ️', text: 'Información importante', bg: '#4fc3f7', color: '#000' },
        warning: { icon: '⚠️', text: 'Atención requerida', bg: '#ffb74d', color: '#000' },
    };
    const cfg = configs[type];
    const toast = document.createElement('div');
    toast.style.cssText = `background:${cfg.bg};color:${cfg.color};padding:0.75rem 1rem;border-radius:8px;font-weight:600;font-size:0.9rem;display:flex;align-items:center;gap:0.5rem;min-width:200px;box-shadow:0 4px 16px rgba(0,0,0,0.3);pointer-events:auto;`;
    toast.innerHTML = `<span>${cfg.icon}</span><span>${cfg.text}</span>`;
    container.appendChild(toast);
    gsap.fromTo(toast, { x: 100, opacity: 0 }, { x: 0, opacity: 1, duration: 0.4, ease: 'power3.out' });
    gsap.to(toast, {
        x: 100, opacity: 0, duration: 0.3, ease: 'power3.in', delay: duration,
        onComplete: () => { container.removeChild(toast); }
    });
}
function restartAnim() {
    const type = document.getElementById('c-type').value;
    const dur = parseFloat(document.getElementById('c-dur').value);
    document.getElementById('show-toast').onclick = () => showToast(type, dur);
    document.getElementById('code-display').textContent = `function showToast(message, type = "success") {
  const toast = document.createElement("div");
  toast.textContent = message;
  document.body.appendChild(toast);
  
  // Entrada
  gsap.fromTo(toast,
    { x: 100, opacity: 0 },
    { x: 0, opacity: 1, duration: 0.4, ease: "power3.out" }
  );
  
  // Salida automática tras ${dur}s
  gsap.to(toast, {
    x: 100, opacity: 0,
    duration: 0.3, delay: ${dur},
    ease: "power3.in",
    onComplete: () => toast.remove()
  });
}`;
}
document.getElementById('c-type').addEventListener('change', restartAnim);
document.getElementById('c-dur').addEventListener('input', function() { document.getElementById('v-dur').textContent = this.value; restartAnim(); });

if (typeof restartAnim === 'function') restartAnim();
</script>
</body>
</html>
