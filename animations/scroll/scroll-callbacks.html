<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
    <title>Callbacks de ScrollTrigger — GSAP Visual Codex</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-1: #0d0f10; --bg-2: #1a1d20; --bg-3: #252a30;
            --text-1: #e4e8ec; --text-2: #a1a9b3;
            --accent: #88ce02; --coral: #ff5e7a; --border-1: #2d3339;
            --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }
        body { font-family: var(--font-body); background: var(--bg-1); color: var(--text-1); }
        .page { max-width: 1000px; margin: 0 auto; padding: 2rem; }
        .back { color: var(--text-2); text-decoration: none; display: inline-block; margin-bottom: 1.5rem; padding: 0.4rem 1rem; border: 1px solid var(--border-1); border-radius: 8px; transition: all 0.2s; }
        .back:hover { color: var(--accent); border-color: var(--accent); }
        h1 { font-size: 2rem; color: var(--accent); margin-bottom: 0.5rem; font-family: var(--font-mono); }
        .subtitle { color: var(--text-2); margin-bottom: 2rem; }
        .stage-wrapper { background: var(--bg-2); border-radius: 12px; border: 1px solid var(--border-1); overflow: auto; margin-bottom: 1rem; max-height: 400px; }
        #demo-stage { min-height: 300px; display: flex; align-items: center; justify-content: center; padding: 2rem; flex-wrap: wrap; gap: 1rem; position: relative; }
        .controls-bar { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }
        .btn { padding: 0.5rem 1.5rem; border-radius: 8px; border: 1px solid var(--border-1); background: var(--bg-2); color: var(--text-1); cursor: pointer; transition: all 0.2s; font-family: var(--font-body); }
        .btn:hover { border-color: var(--accent); color: var(--accent); }
        .panel { background: var(--bg-2); border-radius: 12px; border: 1px solid var(--border-1); padding: 1.5rem; margin-bottom: 2rem; }
        .panel h3 { color: var(--accent); margin-bottom: 1rem; font-size: 0.85rem; letter-spacing: 0.1em; text-transform: uppercase; }
        .control-row { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.75rem; }
        .control-row label { min-width: 130px; font-size: 0.85rem; color: var(--text-2); }
        .control-row input[type=range] { flex: 1; accent-color: var(--accent); }
        .control-row select { padding: 0.25rem 0.5rem; background: var(--bg-3); color: var(--text-1); border: 1px solid var(--border-1); border-radius: 4px; flex: 1; font-family: var(--font-body); }
        .val { min-width: 50px; font-family: var(--font-mono); font-size: 0.85rem; color: var(--accent); }
        .code-block { background: #1e1e2e; border-radius: 12px; border: 1px solid var(--border-1); padding: 1.5rem; margin-bottom: 2rem; }
        pre { overflow-x: auto; }
        code { font-family: var(--font-mono); font-size: 0.9rem; color: #cdd6f4; white-space: pre; }
        .copy-btn { margin-bottom: 1rem; }
        .box { width: 70px; height: 70px; border-radius: 12px; display: grid; place-items: center; font-family: var(--font-mono); font-weight: 700; font-size: 0.8rem; flex-shrink: 0; }
        .box-g { background: linear-gradient(135deg, #88ce02, #5a8a01); color: #0a1400; box-shadow: 0 4px 16px rgba(136,206,2,0.3); }
        .box-p { background: linear-gradient(135deg, #ff5e7a, #c02050); color: #fff; box-shadow: 0 4px 16px rgba(255,94,122,0.3); }
        .box-b { background: linear-gradient(135deg, #4fc3f7, #0277bd); color: #fff; box-shadow: 0 4px 16px rgba(79,195,247,0.3); }
        .scroll-note { background: var(--bg-3); border: 1px solid var(--coral); border-radius: 8px; padding: 1rem; margin-bottom: 1rem; color: var(--text-2); font-size: 0.9rem; }
        .scroll-note strong { color: var(--coral); }
    </style>
</head>
<body>
<div class="page">
    <a href="../../todas-las-animaciones.html" class="back">← Volver</a>
    <h1>Callbacks de ScrollTrigger</h1>
    <p class="subtitle">onEnter, onLeave, onUpdate, onToggle</p>
    
<div class="scroll-note"><strong>Haz scroll</strong> y observa los callbacks ejecutándose en tiempo real</div>
<div class="stage-wrapper" id="scroll-container" style="max-height:400px;overflow-y:scroll;">
  <div style="height:200px;display:flex;align-items:center;justify-content:center;color:var(--text-2);">↓ Scroll lentamente ↓</div>
  <div id="demo-stage" style="min-height:200px;flex-direction:column;gap:0.5rem;"></div>
  <div style="height:400px;"></div>
</div>
<div class="code-block"><button class="btn copy-btn" onclick="copyCode()">📋 Copiar</button><pre><code id="code-display"></code></pre></div>

</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollToPlugin.min.js"></script>
<script>
gsap.registerPlugin(ScrollTrigger, ScrollToPlugin);
let currentTween = null;
const stage = document.getElementById('demo-stage');


function restartAnim() {
    ScrollTrigger.getAll().forEach(t => t.kill());
    gsap.killTweensOf('*');
    const demoStage = document.getElementById('demo-stage');
    demoStage.innerHTML = '';
    demoStage.style.flexDirection = 'column';
    demoStage.style.alignItems = 'flex-start';

    const box = document.createElement('div');
    box.className = 'box box-g';
    box.textContent = 'BOX';

    const log = document.createElement('div');
    log.style.cssText = 'font-family:monospace;font-size:0.8rem;color:var(--text-2);width:100%;max-height:120px;overflow-y:auto;';

    const progress = document.createElement('div');
    progress.style.cssText = 'width:100%;height:8px;background:var(--border-1);border-radius:4px;overflow:hidden;margin-top:0.5rem;';
    const bar = document.createElement('div');
    bar.style.cssText = 'height:100%;background:var(--accent);width:0%;';
    progress.appendChild(bar);

    demoStage.appendChild(box);
    demoStage.appendChild(progress);
    demoStage.appendChild(log);

    function addLog(msg, color='var(--accent)') {
        const d = document.createElement('div');
        d.style.color = color;
        d.textContent = new Date().toLocaleTimeString() + ' → ' + msg;
        log.insertBefore(d, log.firstChild);
    }

    ScrollTrigger.create({
        trigger: box,
        scroller: '#scroll-container',
        start: 'top 80%',
        end: 'bottom 20%',
        markers: true,
        onEnter: () => { addLog('onEnter 🟢', '#88ce02'); gsap.to(box, {scale: 1.3, duration: 0.3}); },
        onLeave: () => { addLog('onLeave ⬆️', '#ffb74d'); gsap.to(box, {scale: 1, duration: 0.3}); },
        onEnterBack: () => { addLog('onEnterBack 🔄', '#4fc3f7'); gsap.to(box, {rotation: 360, duration: 0.5}); },
        onLeaveBack: () => { addLog('onLeaveBack ⬇️', '#ff5e7a'); gsap.to(box, {rotation: 0, duration: 0.3}); },
        onUpdate: (self) => { bar.style.width = (self.progress * 100) + '%'; }
    });

    document.getElementById('code-display').textContent = `ScrollTrigger.create({
  trigger: ".box",
  start: "top 80%",
  end: "bottom 20%",
  onEnter: () => console.log("entró desde arriba"),
  onLeave: () => console.log("salió por arriba"),
  onEnterBack: () => console.log("entró de nuevo desde abajo"),
  onLeaveBack: () => console.log("salió por abajo"),
  onUpdate: (self) => console.log("progreso:", self.progress)
});`;
}


function copyCode() {
    navigator.clipboard.writeText(document.getElementById('code-display').textContent);
}

if (typeof restartAnim === 'function') restartAnim();
</script>
</body>
</html>
