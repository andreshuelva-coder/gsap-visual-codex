<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>DrawSVG — logo en timeline — GSAP Visual Codex</title><style>* { margin: 0; padding: 0; box-sizing: border-box; }
:root { --bg-1: #0d0f10; --bg-2: #1a1d20; --bg-3: #252a30; --text-1: #e4e8ec; --text-2: #a1a9b3; --accent: #88ce02; --coral: #ff5e7a; --border-1: #2d3339; --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; --font-mono: 'JetBrains Mono', monospace; }
body { font-family: var(--font-body); background: var(--bg-1); color: var(--text-1); }
.page { max-width: 1000px; margin: 0 auto; padding: 2rem; }
.back { color: var(--text-2); text-decoration: none; display: inline-block; margin-bottom: 1.5rem; padding: 0.4rem 1rem; border: 1px solid var(--border-1); border-radius: 8px; }
.back:hover { color: var(--accent); border-color: var(--accent); }
h1 { font-size: 2rem; color: var(--accent); margin-bottom: 0.5rem; font-family: var(--font-mono); }
.subtitle { color: var(--text-2); margin-bottom: 2rem; }
.stage-wrapper { background: var(--bg-2); border-radius: 12px; border: 1px solid var(--border-1); overflow: hidden; margin-bottom: 1rem; }
#demo-stage { min-height: 300px; display: flex; align-items: center; justify-content: center; padding: 2rem; flex-wrap: wrap; gap: 1rem; position: relative; }
.controls-bar { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }
.btn { padding: 0.5rem 1.5rem; border-radius: 8px; border: 1px solid var(--border-1); background: var(--bg-2); color: var(--text-1); cursor: pointer; transition: all 0.2s; font-family: var(--font-body); }
.btn:hover { border-color: var(--accent); color: var(--accent); }
.panel { background: var(--bg-2); border-radius: 12px; border: 1px solid var(--border-1); padding: 1.5rem; margin-bottom: 2rem; }
.panel h3 { color: var(--accent); margin-bottom: 1rem; font-size: 0.85rem; letter-spacing: 0.1em; text-transform: uppercase; }
.control-row { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.75rem; }
.control-row label { min-width: 130px; font-size: 0.85rem; color: var(--text-2); }
.control-row input[type=range] { flex: 1; accent-color: var(--accent); }
.control-row select { padding: 0.25rem 0.5rem; background: var(--bg-3); color: var(--text-1); border: 1px solid var(--border-1); border-radius: 4px; flex: 1; }
.val { min-width: 50px; font-family: var(--font-mono); font-size: 0.85rem; color: var(--accent); }
.code-block { background: #1e1e2e; border-radius: 12px; border: 1px solid var(--border-1); padding: 1.5rem; margin-bottom: 2rem; }
pre { overflow-x: auto; } code { font-family: var(--font-mono); font-size: 0.9rem; color: #cdd6f4; white-space: pre; }
.copy-btn { margin-bottom: 1rem; }</style></head>
<body><div class="page">
<a href="../../todas-las-animaciones.html" class="back">← Volver</a>
<h1>DrawSVG — logo en timeline</h1><p class="subtitle">Dibuja un logo SVG con múltiples trazos en secuencia</p>
<div class="stage-wrapper"><div id="demo-stage">
<svg width="200" height="200" viewBox="0 0 200 200">
  <circle id="s1" cx="100" cy="100" r="80" fill="none" stroke="#88ce02" stroke-width="4" stroke-dasharray="0 1000"/>
  <line id="s2" x1="40" y1="100" x2="160" y2="100" stroke="#ff5e7a" stroke-width="4" stroke-dasharray="0 1000" stroke-linecap="round"/>
  <line id="s3" x1="100" y1="40" x2="100" y2="160" stroke="#4fc3f7" stroke-width="4" stroke-dasharray="0 1000" stroke-linecap="round"/>
  <circle id="s4" cx="100" cy="100" r="20" fill="#88ce02" opacity="0"/>
</svg>
</div></div>
<div class="controls-bar"><button class="btn" onclick="restartAnim()">↻ Reiniciar</button></div>
<div class="panel"><h3>Panel de control</h3>
<div class="control-row"><label>velocidad</label><input type="range" id="c-dur" min="0.2" max="2" step="0.1" value="0.8"><span class="val" id="v-dur">0.8</span></div>
</div>
<div class="code-block"><button class="btn copy-btn" onclick="copyCode()">📋 Copiar</button><pre><code id="code-display"></code></pre></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

<script>
let currentTween = null;
const stage = document.getElementById('demo-stage');
function copyCode() { navigator.clipboard.writeText(document.getElementById('code-display').textContent); }

function animPath(el, dur, ease='power2.out') {
    const len = el.tagName === 'circle' ? 2*Math.PI*parseFloat(el.getAttribute('r')||0) : parseFloat(el.getAttribute('x2')||0)-parseFloat(el.getAttribute('x1')||0);
    const total = el.tagName === 'circle' ? 2*Math.PI*80 : 120;
    gsap.set(el, { strokeDasharray: total, strokeDashoffset: total });
    return gsap.to(el, { strokeDashoffset: 0, duration: dur, ease });
}
function restartAnim() {
    gsap.killTweensOf('*');
    const dur = parseFloat(document.getElementById('c-dur').value);
    ['s1','s2','s3'].forEach(id => {
        const el = document.getElementById(id);
        const total = id==='s1' ? 2*Math.PI*80 : 120;
        gsap.set(el, { strokeDasharray: total, strokeDashoffset: total });
    });
    gsap.set('#s4', { opacity: 0, scale: 0, transformOrigin: 'center' });
    const tl = gsap.timeline();
    tl.to('#s1', { strokeDashoffset: 0, duration: dur, ease: 'power2.out' })
      .to('#s2', { strokeDashoffset: 0, duration: dur*0.6, ease: 'power2.out' }, '-=0.2')
      .to('#s3', { strokeDashoffset: 0, duration: dur*0.6, ease: 'power2.out' }, '-=0.2')
      .to('#s4', { opacity: 1, scale: 1, duration: dur*0.5, ease: 'back.out(2)' });
    currentTween = tl;
    document.getElementById('code-display').textContent = `const tl = gsap.timeline();
tl.from("#circulo", { drawSVG: "0%", duration: ${dur} })
  .from("#linea-h", { drawSVG: "0%", duration: ${dur*0.6} }, "-=0.2")
  .from("#linea-v", { drawSVG: "0%", duration: ${dur*0.6} }, "-=0.2")
  .from("#punto", { scale: 0, opacity: 0, duration: ${dur*0.5}, ease: "back.out(2)" });`;
}
document.getElementById('c-dur').addEventListener('input', function() { document.getElementById('v-dur').textContent = this.value; restartAnim(); });

if (typeof restartAnim === 'function') restartAnim();
</script></body></html>
