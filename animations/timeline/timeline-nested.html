<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
    <title>Timelines anidadas — GSAP Visual Codex</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-1: #0d0f10; --bg-2: #1a1d20; --bg-3: #252a30;
            --text-1: #e4e8ec; --text-2: #a1a9b3;
            --accent: #88ce02; --border-1: #2d3339;
            --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }
        body { font-family: var(--font-body); background: var(--bg-1); color: var(--text-1); }
        .page { max-width: 1000px; margin: 0 auto; padding: 2rem; }
        .back { color: var(--text-2); text-decoration: none; display: inline-block; margin-bottom: 1.5rem; }
        .back:hover { color: var(--accent); }
        h1 { font-size: 2rem; color: var(--accent); margin-bottom: 0.5rem; }
        .subtitle { color: var(--text-2); margin-bottom: 2rem; }
        .stage-wrapper { background: var(--bg-2); border-radius: 12px; border: 1px solid var(--border-1); overflow: hidden; margin-bottom: 1rem; min-height: 250px; }
        #demo-stage { min-height: 250px; display: flex; align-items: center; justify-content: center; padding: 2rem; flex-wrap: wrap; gap: 1rem; }
        .controls-bar { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }
        .btn { padding: 0.5rem 1.5rem; border-radius: 8px; border: 1px solid var(--border-1); background: var(--bg-2); color: var(--text-1); cursor: pointer; transition: all 0.2s; }
        .btn:hover { border-color: var(--accent); color: var(--accent); }
        .panel { background: var(--bg-2); border-radius: 12px; border: 1px solid var(--border-1); padding: 1.5rem; margin-bottom: 2rem; }
        .panel h3 { color: var(--accent); margin-bottom: 1rem; font-size: 0.85rem; letter-spacing: 0.1em; text-transform: uppercase; }
        .control-row { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.75rem; }
        .control-row label { min-width: 120px; font-size: 0.85rem; color: var(--text-2); }
        .control-row input[type=range] { flex: 1; accent-color: var(--accent); }
        .control-row select { padding: 0.25rem 0.5rem; background: var(--bg-3); color: var(--text-1); border: 1px solid var(--border-1); border-radius: 4px; flex: 1; }
        .val { min-width: 50px; font-family: var(--font-mono); font-size: 0.85rem; color: var(--accent); }
        .code-block { background: #1e1e2e; border-radius: 12px; border: 1px solid var(--border-1); padding: 1.5rem; margin-bottom: 2rem; }
        pre { overflow-x: auto; }
        code { font-family: var(--font-mono); font-size: 0.9rem; color: #cdd6f4; white-space: pre; }
        .copy-btn { margin-bottom: 1rem; }
        .box { width: 60px; height: 60px; border-radius: 10px; display: grid; place-items: center; font-family: var(--font-mono); font-weight: 700; font-size: 0.75rem; flex-shrink: 0; }
        .box-green { background: linear-gradient(135deg, #88ce02, #6ba301); color: #0a1400; box-shadow: 0 4px 16px rgba(136,206,2,0.3); }
        .box-pink { background: linear-gradient(135deg, #ff5e7a, #d63851); color: #fff; box-shadow: 0 4px 16px rgba(255,94,122,0.3); }
        .box-blue { background: linear-gradient(135deg, #4fc3f7, #0288d1); color: #fff; box-shadow: 0 4px 16px rgba(79,195,247,0.3); }
        .box-orange { background: linear-gradient(135deg, #ffb74d, #f57c00); color: #fff; box-shadow: 0 4px 16px rgba(255,183,77,0.3); }
        .box-purple { background: linear-gradient(135deg, #ce93d8, #7b1fa2); color: #fff; box-shadow: 0 4px 16px rgba(206,147,216,0.3); }
    </style>
</head>
<body>
<div class="page">
    <a href="../../todas-las-animaciones.html" class="back">← Volver</a>
    <h1>Timelines anidadas</h1>
    <p class="subtitle">Una timeline dentro de otra para organizar animaciones complejas</p>
    
<div class="stage-wrapper"><div id="demo-stage"></div></div>
<div class="controls-bar">
    <button class="btn" onclick="restartAnim()">↻ Reiniciar</button>
    <button class="btn" onclick="currentTween?.pause()">⏸ Pausa</button>
    <button class="btn" onclick="currentTween?.play()">▶ Reproducir</button>
</div>
<div class="code-block"><button class="btn copy-btn" onclick="copyCode()">📋 Copiar</button><pre><code id="code-display"></code></pre></div>

</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
let currentTween = null;
const stage = document.getElementById('demo-stage');


function restartAnim() {
    stage.innerHTML = '';
    if (currentTween?.kill) currentTween.kill();
    gsap.killTweensOf('*');
    stage.style.flexDirection = 'column';
    stage.style.alignItems = 'flex-start';
    stage.style.gap = '1rem';

    const row1 = document.createElement('div');
    row1.style.cssText = 'display:flex;gap:0.5rem;';
    const row2 = document.createElement('div');
    row2.style.cssText = 'display:flex;gap:0.5rem;';

    const boxes1 = ['A','B','C'].map((t,i) => {
        const b = document.createElement('div');
        b.className = 'box box-green';
        b.textContent = t;
        row1.appendChild(b);
        return b;
    });
    const boxes2 = ['X','Y','Z'].map((t,i) => {
        const b = document.createElement('div');
        b.className = 'box box-pink';
        b.textContent = t;
        row2.appendChild(b);
        return b;
    });
    stage.appendChild(row1);
    stage.appendChild(row2);

    const tl1 = gsap.timeline();
    boxes1.forEach(b => tl1.from(b, { x: -100, opacity: 0, duration: 0.4, ease: 'power2.out' }, '-=0.2'));

    const tl2 = gsap.timeline();
    boxes2.forEach(b => tl2.from(b, { x: 100, opacity: 0, duration: 0.4, ease: 'power2.out' }, '-=0.2'));

    const master = gsap.timeline();
    master.add(tl1).add(tl2, '-=0.3');
    currentTween = master;

    document.getElementById('code-display').textContent = `// Timeline hija 1
const tl1 = gsap.timeline();
tl1.from(".a", opts).from(".b", opts).from(".c", opts);

// Timeline hija 2
const tl2 = gsap.timeline();
tl2.from(".x", opts).from(".y", opts).from(".z", opts);

// Timeline maestra que las contiene
const master = gsap.timeline();
master.add(tl1)
      .add(tl2, "-=0.3"); // empieza 0.3s antes de que termine tl1`;
}


function copyCode() {
    navigator.clipboard.writeText(document.getElementById('code-display').textContent);
}

restartAnim();
</script>
</body>
</html>
